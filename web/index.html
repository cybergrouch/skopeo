<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Skopeo" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skopeo</title>
    <meta
      name="description"
      content="Skopeo calculates performance-based NTRP tennis ratings from your match results."
    />
    <!--
      Default Open Graph / Twitter Card tags (#192 follow-up) so shared links render a brand card on
      Facebook/X/LinkedIn/WhatsApp/iMessage. These are static/site-wide: crawlers read the initial HTML
      and don't run the SPA, so per-page (per match/player/event) tags need a server-side responder —
      tracked separately. og:image/url are absolute (crawlers require it).
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Skopeo" />
    <meta property="og:title" content="Skopeo — performance-based tennis ratings" />
    <meta
      property="og:description"
      content="Skopeo calculates performance-based NTRP tennis ratings from your match results."
    />
    <meta property="og:url" content="https://skopeo.co" />
    <meta property="og:image" content="https://skopeo.co/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Skopeo — performance-based tennis ratings" />
    <meta
      name="twitter:description"
      content="Skopeo calculates performance-based NTRP tennis ratings from your match results."
    />
    <meta name="twitter:image" content="https://skopeo.co/og-cover.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
