openapi: 3.0.0
info:
  title: Skopeo API
  version: 1.0.0
  description: Performance-based tennis ranking calculation API using the NTRP rating system

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Rankings
    description: Rating calculation endpoints
  - name: Users
    description: User management — provisioning and profile CRUD (Firebase-authenticated)
  - name: Contacts
    description: Email/phone management; verification is an ADMINISTRATOR action
  - name: Names
    description: Append-only user names; the display name is a DISPLAY-typed name
  - name: Capabilities
    description: User roles (admin-only); append-only grants with audit
  - name: Ratings
    description: Player ratings & assessment; initial ratings are administrator-set
  - name: Matches
    description: Match fixtures & results (append-only); ratings calculated separately
  - name: Invites
    description: Admin onboarding invites for manual (email-link) sign-ups
  - name: Player Lists
    description: Host-curated player lists and generated seedings (HOST/CLUB_OWNER/ADMINISTRATOR)
  - name: Standings
    description: Per-band "Ranking Race" standings (interim, ratings-derived); any signed-in player
  - name: Ranking Points
    description: Append-only ranking-points ledger; admins grant/revoke awards (manual & ad-hoc)
  - name: Settings
    description: Global app settings; the UI theme is publicly readable and administrator-writable
  - name: Points Budget
    description: Global points policy and per-club budgets; points-manager (or administrator) managed

paths:
  /api/v1/calculate-ranking:
    post:
      summary: Calculate ranking changes
      description: |
        Calculates rating changes for players based on match results.
        Uses the NTRP (National Tennis Rating Program) system.

        The algorithm uses a performance-based Elo calculation that considers:
        - Current player ratings and rating difference
        - Match score and game margins
        - Dominance factor (games won ratio)
        - Expected vs actual performance

        Returns updated ratings with published levels and percentage changes.
      tags:
        - Rankings
      requestBody:
        required: true
        description: Match details and player ratings
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RankingCalculationRequest'
            examples:
              singles:
                summary: Singles (1 player per team)
                value:
                  teams:
                    T1:
                      teamId: "T1"
                      name: "Player 1"
                      players:
                        - playerId: "P1"
                          name: "Player 1"
                          rating:
                            value: "4.5"
                      teamType: "SINGLES"
                    T2:
                      teamId: "T2"
                      name: "Player 2"
                      players:
                        - playerId: "P2"
                          name: "Player 2"
                          rating:
                            value: "4.0"
                      teamType: "SINGLES"
                  matchScore:
                    sets:
                      - games:
                          T1: 6
                          T2: 2
                        winnerTeamId: "T1"
              doubles:
                summary: Doubles (2 players per team; both teams must share the same format)
                description: >-
                  A team is evaluated at the mean of its two partners' ratings; the team's change is split
                  back to each partner in proportion to their share of that mean. MIXED_DOUBLES is scored
                  identically to DOUBLES.
                value:
                  teams:
                    T1:
                      teamId: "T1"
                      name: "Team 1"
                      players:
                        - playerId: "P1"
                          name: "Player 1"
                          rating:
                            value: "5.0"
                        - playerId: "P2"
                          name: "Player 2"
                          rating:
                            value: "3.0"
                      teamType: "DOUBLES"
                    T2:
                      teamId: "T2"
                      name: "Team 2"
                      players:
                        - playerId: "P3"
                          name: "Player 3"
                          rating:
                            value: "4.0"
                        - playerId: "P4"
                          name: "Player 4"
                          rating:
                            value: "4.0"
                      teamType: "DOUBLES"
                  matchScore:
                    sets:
                      - games:
                          T1: 6
                          T2: 4
                        winnerTeamId: "T1"
      responses:
        '200':
          description: Successfully calculated rating changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingCalculationResponse'
        '400':
          description: Invalid request (validation error or malformed JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/search:
    get:
      summary: Paged player search with a total count (#232)
      description: >-
        Same filters as `GET /api/v1/users` search mode (name/code/q/sex/age/rating; at least one
        required), but returns a page `{ items, total }` so the UI can show the current page, links to
        other pages, and the total. RESEARCHER, RATER, HOST, or ADMINISTRATOR.
      tags:
        - Users
      security:
        - firebaseAuth: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Fuzzy name fragment.
        - name: code
          in: query
          required: false
          schema:
            type: string
          description: Shareable player-code prefix, case-insensitive.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Unified term — fuzzy name OR code prefix.
        - name: sex
          in: query
          required: false
          schema:
            type: string
            enum: [Male, Female]
        - name: age
          in: query
          required: false
          schema:
            type: string
          description: 'Age interval of whole numbers, e.g. "(20,30]".'
        - name: rating
          in: query
          required: false
          schema:
            type: string
          description: 'NTRP rating interval, e.g. "[3.0,4.0)".'
        - name: capability
          in: query
          required: false
          schema:
            type: string
            enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR, RATER, RESEARCHER, POINTS_MANAGER]
          description: Restrict to users holding this capability (#317), e.g. CLUB_OWNER.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Page size; coerced to 1..100, default 20.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
          description: Results to skip for pagination; default 0.
      responses:
        '200':
          description: A page of matching users with the total count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummaryPageResponse'
        '400':
          description: No filter given, or a malformed age/rating interval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller lacks search access

  /api/v1/users:
    get:
      summary: Look up users by id (HOST/ADMINISTRATOR), or search by name/sex/age/rating (RESEARCHER or staff)
      description: |
        Two modes:
          - **Id resolution** — `ids` (comma-separated UUIDs) resolves known ids to summaries
            (match rosters, rating history, calculation previews); HOST/ADMINISTRATOR only. Exclusive:
            it cannot be combined with the search filters below.
          - **Search** — RESEARCHER or staff (#107). Any combination of `name`, `code`, `q`, `sex`, `age`, `rating`
            (AND-combined; at least one required). `name` is a fuzzy, partial match across all of
            a profile's names; `code` is a player-code prefix; `q` is a unified term matching a
            fuzzy name OR a code prefix. `age` and `rating` are interval strings: `[` / `]`
            inclusive, `(` / `)`
            exclusive, an empty side is unbounded — e.g. `(3.0,4.0)`, `[3.0,4.0)`, `(20,30]`,
            `[3.0,)`. Rating filters the NTRP rating.
        Returns slim summaries (no contacts/identities); capped server-side.
      tags:
        - Users
      security:
        - firebaseAuth: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Fuzzy name fragment (search mode).
        - name: code
          in: query
          required: false
          schema:
            type: string
          description: Shareable player-code prefix, case-insensitive (search mode).
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: >-
            Unified picker term — matches a fuzzy name OR a player-code prefix (search mode), so
            typing either surfaces players incrementally.
        - name: sex
          in: query
          required: false
          schema:
            type: string
            enum: [Male, Female]
          description: Exact sex filter (search mode).
        - name: age
          in: query
          required: false
          schema:
            type: string
          description: 'Age interval of whole numbers, e.g. "(20,30]" (search mode).'
        - name: rating
          in: query
          required: false
          schema:
            type: string
          description: 'NTRP rating interval, e.g. "[3.0,4.0)" (search mode).'
        - name: capability
          in: query
          required: false
          schema:
            type: string
            enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR, RATER, RESEARCHER, POINTS_MANAGER]
          description: Restrict to users holding this capability (#317), e.g. CLUB_OWNER.
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated UUIDs to resolve (exclusive; not combinable with filters).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Max results to return (search mode); coerced to 1..100, default 20.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
          description: Number of results to skip (search mode) for pagination; default 0.
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummaryResponse'
        '400':
          description: Neither or both of name/ids given, blank name, or a malformed id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not HOST or ADMINISTRATOR
    post:
      summary: Provision the authenticated user
      description: |
        The single final step of every sign-up flow (Google, Facebook, manual).
        Identity (firebase uid, email, sign-in provider, photo) is taken from the
        verified Firebase token — never the request body. Idempotent: re-posting with
        an already-known uid returns the existing user with 200 instead of 201.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '200':
          description: User already existed (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: >-
            A manual (password/email-link) sign-up whose email has no open invite (issue #74).
            OAuth sign-ups are exempt.

  /api/v1/users/me:
    get:
      summary: Get the authenticated user's own profile
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The caller's profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid Firebase token
        '404':
          description: Caller has not been provisioned yet (POST /api/v1/users first)

  /api/v1/players/{code}:
    get:
      summary: Resolve a player's shareable public profile by code (viewable without login, #193)
      tags:
        - Users
      security:
        - firebaseAuth: []
        - {}
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The player's shareable public code (case-insensitive).
      responses:
        '200':
          description: The player's limited public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicPlayerResponse'
        '401':
          description: Missing or invalid Firebase token
        '404':
          description: No active player with that code

  /api/v1/players/{code}/match-history:
    get:
      summary: A page of a player's match history by code (viewable without login, #193; privacy-conscious)
      description: >-
        A page of the player's matches (scheduled, completed, and rated), newest first, optionally
        narrowed by `search`. Returns the requested slice plus the total matching count (#284), for a
        bounded profile preview and a numbered full-history page. Ratings appear only as the published
        NTRP band at the time of the match, and only for rated matches.
      tags:
        - Users
      security:
        - firebaseAuth: []
        - {}
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The player's shareable public code (case-insensitive).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size (1–100; default 20).
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of matching matches to skip.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive substring over opponent/partner display names and public codes.
      responses:
        '200':
          description: A page of the player's match history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerMatchHistoryPage'
        '401':
          description: Missing or invalid Firebase token
        '404':
          description: No active player with that code

  /api/v1/players/{code}/results-summary:
    get:
      summary: A player's win–loss record over time by code (viewable without login, #193)
      description: >-
        Win/loss counts bucketed by calendar month and split into singles vs doubles (MIXED_DOUBLES
        counts as doubles), over every decided match the player took part in. Aggregated server-side,
        so it is independent of how match history is listed/paginated. No ratings are exposed.
      tags:
        - Users
      security:
        - firebaseAuth: []
        - {}
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The player's shareable public code (case-insensitive).
      responses:
        '200':
          description: The player's win–loss summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerResultsSummary'
        '401':
          description: Missing or invalid Firebase token
        '404':
          description: No active player with that code

  /api/v1/players/{code}/rating-history:
    get:
      summary: A player's rating history by code (ADMINISTRATOR only)
      description: >-
        The precise rating-history audit view for any player, resolved by public code. Unlike match
        history this exposes full rating values alongside the published bands, so it is restricted to
        ADMINISTRATORs (the owner reads their own history via /api/v1/users/{id}/rating-history).
      tags:
        - Users
      security:
        - firebaseAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The player's shareable public code (case-insensitive).
      responses:
        '200':
          description: The player's rating history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RatingHistoryResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No active player with that code

  /api/v1/players/{code}/standing:
    get:
      summary: A player's band+sex rank and points by code (viewable without login, #448)
      description: >-
        The player's rank within their (NTRP band, sex) group and the points backing it, under the
        active standings source (#424). Order and points are public (#64/#114), so this is viewable
        without login on the public profile. An unranked player (unrated, or no points in the current
        standings) yields 204 No Content, which the UI renders as "unranked".
      tags:
        - Users
      security:
        - firebaseAuth: []
        - {}
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The player's shareable public code (case-insensitive).
      responses:
        '200':
          description: The player's current band+sex rank and points
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStandingResponse'
        '204':
          description: The player is unranked (unrated, or absent from the current standings)
        '404':
          description: No active player with that code

  /api/v1/players/{code}/points:
    get:
      summary: A player's active ranking-point awards by code (owner or ADMINISTRATOR only, #448)
      description: >-
        The profile points audit — the player's ACTIVE ranking-point awards (status ACTIVE and now
        within their validity window). Each award carries its points, band, expiry (validUntil), and a
        link to the granting match (its public code); an award with no match link (a manual grant or a
        pre-V19 finalize award) falls back to the event code. Visible only to the profile owner and to
        ADMINISTRATORs; other and anonymous viewers get 403.
      tags:
        - Users
      security:
        - firebaseAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The player's shareable public code (case-insensitive).
      responses:
        '200':
          description: The player's active ranking-point awards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivePointsAwardResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is neither the owner nor an ADMINISTRATOR
        '404':
          description: No active player with that code

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a user by id
      description: Permitted only for the user themselves or an ADMINISTRATOR.
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The requested user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Malformed id
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is neither the target user nor an ADMINISTRATOR
        '404':
          description: No such user
    patch:
      summary: Partially update a user's profile
      description: Omitted (null) fields are left unchanged. Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such user
    put:
      summary: Replace a user's mutable profile fields
      description: Replaces dateOfBirth/sex/city wholesale — omitted fields are cleared. The photo is set separately via PUT /photo (#303). Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such user
    delete:
      summary: Deactivate (soft-delete) a user
      description: Sets is_active to false. Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: User deactivated
        '403':
          description: Forbidden
        '404':
          description: No such user

  /api/v1/users/{id}/photo:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Set a user's profile-photo controls
      description: >-
        Sets a custom public image URL (blank/absent clears it, reverting to the OAuth photo) and a
        hide flag. A user-set custom photo or a hide is never overwritten by the login-time OAuth
        photo sync (#303). Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhotoSettingsRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid body (e.g. customPhotoUrl is not an http(s) URL) or malformed id
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is neither the target user nor an ADMINISTRATOR
        '404':
          description: No such user

  /api/v1/users/{id}/duplicates:
    parameters:
      - name: id
        in: path
        required: true
        description: The canonical ("true") account the duplicates are attributed to.
        schema:
          type: string
          format: uuid
    post:
      summary: Mark users as duplicates of this canonical account (#124)
      description: ADMINISTRATOR only. Disables each listed user and points it at the canonical account; reversible and audit-logged. Ratings are not consolidated.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkDuplicatesRequest'
      responses:
        '200':
          description: The canonical account's duplicates after marking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummaryResponse'
        '400':
          description: Empty/duplicate ids, self-reference, or a malformed id
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such canonical or duplicate user
        '409':
          description: The canonical is itself a duplicate, or a target is itself a canonical
    get:
      summary: List the duplicates of this canonical account (#124)
      description: ADMINISTRATOR only — backs the un-mark (restore) view.
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The disabled duplicates pointing at this account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummaryResponse'
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user

  /api/v1/users/{id}/duplicate:
    parameters:
      - name: id
        in: path
        required: true
        description: A user currently marked as a duplicate.
        schema:
          type: string
          format: uuid
    delete:
      summary: Restore a user from duplicate status (#124)
      description: ADMINISTRATOR only. Reactivates the user and clears its canonical pointer; audit-logged.
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: User restored
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user
        '409':
          description: The user is not marked as a duplicate

  /api/v1/users/{userId}/contacts:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List a user's contacts
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user
    post:
      summary: Add an email or phone
      description: |
        Created as MANUAL/PENDING and active. Self-or-ADMINISTRATOR. Values are immutable;
        to change a contact, disable the current one (via /state) and add a new one.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreateRequest'
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body
        '403':
          description: Forbidden
        '404':
          description: No such user
        '409':
          description: An active contact of that type already exists for the user

  /api/v1/users/{userId}/contacts/{id}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a contact
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '403':
          description: Forbidden
        '404':
          description: No such contact

  /api/v1/users/{userId}/contacts/{id}/state:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Enable or disable a contact
      description: |
        Contact values are immutable — instead of editing, disable a contact and add a new
        one. Self-or-ADMINISTRATOR. Re-enabling a contact while another of the same type is
        already active is a conflict.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactStateRequest'
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such contact
        '409':
          description: Another active contact of that type already exists

  /api/v1/users/{userId}/contacts/{id}/verification:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Set a contact's verification state (ADMINISTRATOR only)
      description: |
        Manual stand-in for automated OTP. Only an ADMINISTRATOR may call this. A VERIFIED
        status stamps verifiedAt/verifiedBy and the method (default ADMIN_OVERRIDE); any
        other status clears those audit fields.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such contact
        '409':
          description: This value is already verified for another account

  /api/v1/users/{userId}/names:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List a user's names
      tags:
        - Names
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's names (incl. disabled history)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NameResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user
    post:
      summary: Add a name
      description: |
        Append-only. Self-or-ADMINISTRATOR. The single-valued types (DISPLAY, FIRST, LAST) keep
        exactly one active value — adding a new one supersedes the prior active of that type (the
        old becomes disabled history). Other types may have multiple active names. Values are
        immutable; to change those, disable (via /state) and add a new one. FIRST/LAST are private
        — they never appear on the public profile.
      tags:
        - Names
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameCreateRequest'
      responses:
        '201':
          description: Name created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameResponse'
        '400':
          description: Invalid body
        '403':
          description: Forbidden
        '404':
          description: No such user

  /api/v1/users/{userId}/names/{id}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a name
      tags:
        - Names
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameResponse'
        '403':
          description: Forbidden
        '404':
          description: No such name

  /api/v1/users/{userId}/names/{id}/state:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Enable or disable a name
      description: |
        Name values are immutable — instead of editing, disable a name and add a new one.
        Self-or-ADMINISTRATOR. The display name cannot be disabled (replace it by posting a
        new DISPLAY name); re-enabling a former display name conflicts with the current one.
      tags:
        - Names
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameStateRequest'
      responses:
        '200':
          description: Updated name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameResponse'
        '400':
          description: Invalid body, malformed id, or attempting to disable the display name
        '403':
          description: Forbidden
        '404':
          description: No such name
        '409':
          description: Re-enabling a former display name conflicts with the current one

  /api/v1/users/{userId}/capabilities:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List a user's capabilities (ADMINISTRATOR only)
      description: Includes revoked history. The whole capability API is admin-only.
      tags:
        - Capabilities
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's capability grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CapabilityResponse'
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user
    post:
      summary: Grant a capability (ADMINISTRATOR only)
      description: Idempotent — 201 when newly granted, 200 if already held. Records granted_by.
      tags:
        - Capabilities
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityGrantRequest'
      responses:
        '201':
          description: Capability granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '200':
          description: Capability already held (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '400':
          description: Invalid capability
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user

  /api/v1/users/{userId}/capabilities/{capability}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: capability
        in: path
        required: true
        schema:
          type: string
          enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR, RATER, RESEARCHER, POINTS_MANAGER]
    delete:
      summary: Revoke a capability (ADMINISTRATOR only)
      description: |
        Disables the active grant (kept as history). Guardrails: PLAYER cannot be revoked; the
        last ADMINISTRATOR cannot be revoked; an admin cannot revoke their own ADMINISTRATOR
        while others remain.
      tags:
        - Capabilities
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: Capability revoked
        '403':
          description: Caller is not an ADMINISTRATOR, or revoking own ADMINISTRATOR
        '404':
          description: No such user, or the capability is not currently held
        '409':
          description: Revoking PLAYER or the last ADMINISTRATOR

  /api/v1/ratings/calculations:
    post:
      summary: Trigger the rating calculation (ADMINISTRATOR only)
      description: |
        Processes matches pending calculation oldest→newest, carrying ratings forward. dryRun
        defaults to true (an empty body is a dry run) and previews with no writes; an explicit
        false commits ratings, history, and rated_at.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculationRequest'
      responses:
        '200':
          description: The calculation outcome (preview or committed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationResponse'
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/users/pending-assessment:
    get:
      summary: List users pending an initial rating, paged (RATER or ADMINISTRATOR)
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size (clamped to 1..100).
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of rows to skip (clamped to >= 0).
      responses:
        '200':
          description: A page of active users with no rating on record, plus the total count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingAssessmentPageResponse'
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/users/{userId}/ratings:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a user's current ratings
      description: Self-or-ADMINISTRATOR. Returns the user's NTRP rating.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRatingResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user
    put:
      summary: Set or adjust a user's rating (RATER or ADMINISTRATOR)
      description: |
        The initial assessment, or a later adjustment. Validates the NTRP range
        (1.0–7.0) and derives the published level.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRatingRequest'
      responses:
        '200':
          description: The updated rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRatingResponse'
        '400':
          description: Invalid rating value/confidence
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user

  /api/v1/users/{userId}/rating-history:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a user's rating history
      description: Self-or-ADMINISTRATOR.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: Rating-change history (most recent first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RatingHistoryResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user

  /api/v1/matches:
    get:
      summary: List match fixtures by oversight view (HOST/ADMINISTRATOR)
      description: |
        An ADMINISTRATOR sees every match in the view; a HOST sees only the fixtures
        they created (so they can find their own matches awaiting results).
      tags:
        - Matches
      security:
        - firebaseAuth: []
      parameters:
        - name: filter
          in: query
          required: true
          schema:
            type: string
            enum: [pending-calculation, awaiting-results, results]
          description: >
            pending-calculation = completed & unrated; awaiting-results = scheduled, any match date;
            results = an event's completed fixtures (rated or not), event-scoped via eventId (#138).
        - name: eventId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Scope awaiting-results to a single event's fixtures (#138).
      responses:
        '200':
          description: Matching fixtures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MatchResponse'
        '400':
          description: Missing or invalid filter
        '403':
          description: Caller is not an ADMINISTRATOR
    post:
      summary: Create a match fixture (HOST/ADMINISTRATOR)
      description: Scheduled fixture, no results. Every participant must already be rated.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFixtureRequest'
      responses:
        '201':
          description: Fixture created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '400':
          description: Invalid input (bad ids/date, unrated participant, bad composition)
        '403':
          description: Caller is not HOST/ADMINISTRATOR

  /api/v1/matches/upcoming:
    get:
      summary: The caller's own upcoming (scheduled) matches (#251)
      description: >-
        The authenticated caller's SCHEDULED fixtures dated today or later, soonest first, for the
        private profile. Owner-only (derived from the token); an unprovisioned caller gets an empty list.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The caller's upcoming matches (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UpcomingMatchResponse'

  /api/v1/matches/code/{code}:
    parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get a match's public page by code (#136)
      description: >-
        Read-only public summary of a match resolved by its shareable public code. Viewable without
        login (#193); a token, if present, lets RATER/ADMINISTRATOR viewers see precise rates.
      tags:
        - Matches
      security:
        - firebaseAuth: []
        - {}
      responses:
        '200':
          description: The public match summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchPublicResponse'
        '404':
          description: No active match with that code

  /api/v1/matches/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a match
      description: Limited to a participant or HOST/ADMINISTRATOR.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '403':
          description: Forbidden
        '404':
          description: No such match

  /api/v1/matches/{id}/calculation:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a rated match's result with its stored rating calculation
      description: >-
        The match result plus the per-player calculation breakdown persisted at commit time
        (issue #97) — what a rating-history entry links to. Reads stored values; never recomputed,
        so it stays faithful if the algorithm constants change. Limited to a participant or
        HOST/ADMINISTRATOR.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The match result and stored calculation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchCalculationDetailResponse'
        '403':
          description: Forbidden
        '404':
          description: No such match, or no calculation has been committed for it

  /api/v1/matches/calculation-order:
    put:
      summary: Reorder same-date matches for calculation (HOST/ADMINISTRATOR)
      description: |
        Set the manual calculation-order tiebreaker (#331/#332). The rating calculation orders matches
        by match date first, so this only re-sequences matches that share the same date. The request
        lists the match ids in the desired order; each is assigned its position. Rated matches are
        frozen and cannot be reordered.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderMatchesRequest'
      responses:
        '204':
          description: The order was updated
        '400':
          description: Empty/duplicate ids, a disabled match, or matches spanning more than one date
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such match
        '409':
          description: A listed match has already been rated

  /api/v1/matches/{id}/result:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Upload or edit match results (HOST/ADMINISTRATOR)
      description: |
        Records the set scores, derives the winner, and marks the match COMPLETED (pending
        calculation). Ratings are NOT computed here. May be called again to EDIT the result while the
        match is still unrated — the sets are replaced. Once the match has been rated, the result is
        frozen (409).
      tags:
        - Matches
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchResultRequest'
      responses:
        '200':
          description: Completed match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '400':
          description: Invalid scores or no clear winner
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such match
        '409':
          description: The match is disabled, or already rated (the result is frozen)

  /api/v1/matches/{id}/state:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Enable or disable a match (HOST/ADMINISTRATOR)
      description: |
        Append-only corrections: disable the original and add a new match. Disabling is allowed
        only while the match is unrated.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchStateRequest'
      responses:
        '200':
          description: Updated match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such match
        '409':
          description: Cannot disable a match that has already been rated

  /api/v1/events:
    get:
      summary: List events (HOST/ADMINISTRATOR)
      description: An ADMINISTRATOR sees all events; a HOST sees their own. (#138)
      tags:
        - Events
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The caller's events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResponse'
        '403':
          description: Caller is not HOST/ADMINISTRATOR
    post:
      summary: Create an event (HOST/ADMINISTRATOR)
      tags:
        - Events
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Invalid input (blank name, bad dates, unknown participant)
        '403':
          description: Caller is not HOST/ADMINISTRATOR

  /api/v1/events/mine:
    get:
      summary: The caller's own events (#202)
      description: >-
        Every event the authenticated player is on (any status — APPROVED/PENDING/HOLD), for the
        Profile tab's "Events history". Not staff-gated; an unprovisioned caller gets an empty list.
      tags:
        - Events
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The caller's events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyEventResponse'

  /api/v1/events/code/{code}:
    parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get an event's public page by code (#138)
      description: >-
        Read-only public summary of an event resolved by its shareable public code (details,
        participant roster, and the event's matches). Viewable without login (#193); a token, if
        present, personalizes the viewer's join status.
      tags:
        - Events
      security:
        - firebaseAuth: []
        - {}
      responses:
        '200':
          description: The public event summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPublicResponse'
        '404':
          description: No active event with that code

  /api/v1/events/code/{code}/signup:
    parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Self-signup to an event by code (#201)
      description: >-
        The authenticated player requests to join the event as a PENDING participant a host then
        approves or holds. Any provisioned player may sign up (not staff-gated); idempotent if
        already on the event. Returns the public event summary (with the viewer's new status).
      tags:
        - Events
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The public event summary after signing up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPublicResponse'
        '403':
          description: Caller has no Skopeo profile yet
        '404':
          description: No active event with that code

  /api/v1/events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get an event with its participants (HOST/ADMINISTRATOR)
      tags:
        - Events
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such event
    patch:
      summary: Rename an event (HOST owns / ADMINISTRATOR any)
      description: |
        Partial update of an event (#269). Currently only the name is editable; the name is
        validated (non-blank) and trimmed. A HOST may rename only their own event; an ADMINISTRATOR
        may rename any.
      tags:
        - Events
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
      responses:
        '200':
          description: The updated event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Missing or blank name
        '403':
          description: Caller is not HOST/ADMINISTRATOR, or a HOST renaming another's event
        '404':
          description: No such event
    delete:
      summary: Delete an event (HOST owns / ADMINISTRATOR any)
      description: |
        Soft-deletes an event, gated by its matches. Any rated match blocks deletion outright; any
        recorded (but unrated) match is refused with advice to delete those matches first. Remaining
        scheduled fixtures are soft-disabled alongside the event. A HOST may delete only their own event.
      tags:
        - Events
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: Event deleted
        '403':
          description: Caller is not HOST/ADMINISTRATOR, or a HOST deleting another's event
        '404':
          description: No such event
        '409':
          description: The event has recorded or rated matches and cannot be deleted

  /api/v1/events/{id}/club:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Set or clear an event's club
      description: >-
        Set the event's club, or clear it when clubId is null/absent (#319). Staff-only — a HOST may
        edit only their own event, an ADMINISTRATOR any. A non-null club must exist.
      tags:
        - Events
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetEventClubRequest'
      responses:
        '200':
          description: The updated event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Malformed id or unknown club
        '403':
          description: Caller is not HOST/ADMINISTRATOR, or a HOST editing another's event
        '404':
          description: No such event

  /api/v1/events/{id}/calculation-priority:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Set an event's rating-calculation processing priority
      description: >-
        ADMINISTRATOR only (#335). Sets the event's processing order for the rating calculation
        (Pending Calculation groups by event); persisted on the same scale as the event's end date so
        a dragged event slots between date-ordered neighbours.
      tags:
        - Events
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetCalcPriorityRequest'
      responses:
        '200':
          description: The updated event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Malformed id or body
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such event

  /api/v1/events/{id}/points-config:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Set an event's points config (HOST owns / CLUB_OWNER / ADMINISTRATOR)
      description: >-
        Set an event's per-match reward window (min/max points) and point validity window (#403 Phase C).
        Every event class carries a config (OPEN_PLAY unified with TOURNAMENT/LEAGUE). Staff-only and not
        allowed on a finalized event. The window is validated against the global per-type policy, and a
        tightened range is rejected if it would exclude an existing active fixture's designation.
      tags:
        - Events
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPointsConfigRequest'
      responses:
        '200':
          description: The updated event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Malformed body, a window outside the global policy, or a fixture designation out of range
        '403':
          description: Caller is not staff, or a HOST editing another's event
        '404':
          description: No such event

  /api/v1/events/{id}/finalize:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Finalize an event (HOST owns / CLUB_OWNER / ADMINISTRATOR)
      description: >-
        Finalize an event (#403) — terminal: it closes the event to further changes and queues the
        event's matches for rating (moving the rating-queue trigger from result-upload time to finalize
        time; event-less matches keep queuing immediately). A HOST may finalize only their own event; an
        ADMINISTRATOR or CLUB_OWNER any. There is no un-finalize in Phase A.
      tags:
        - Events
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The finalized event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Event is already finalized, or a deleted event
        '403':
          description: Caller is not staff, or a HOST finalizing another's event
        '404':
          description: No such event

  /api/v1/events/{id}/participants:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Add a participant to an event (HOST/ADMINISTRATOR)
      tags:
        - Events
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddParticipantRequest'
      responses:
        '200':
          description: The updated event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Unknown participant
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such event

  /api/v1/events/{id}/participants/{userId}/decision:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Decide a participant request — approve or hold (#201, HOST/ADMINISTRATOR)
      description: >-
        Approve a PENDING/HOLD request (→ APPROVED full roster member) or put it on HOLD (a soft deny
        that stays on file and can be approved later). Staff-only.
      tags:
        - Events
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideParticipantRequest'
      responses:
        '200':
          description: The updated event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Invalid decision (must be APPROVED or HOLD)
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such event

  /api/v1/events/{id}/participants/{userId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      summary: Remove a participant from an event (HOST/ADMINISTRATOR)
      tags:
        - Events
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The updated event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such event

  /api/v1/rating-requests:
    post:
      summary: Raise a re-rate request (player, #140)
      description: A player with an existing rating raises one open reconsideration request, with a justification.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRatingRequestRequest'
      responses:
        '201':
          description: The created request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingRequestResponse'
        '400':
          description: Blank justification, or the player has no rating yet
        '403':
          description: No account
        '409':
          description: The player already has an open request
    get:
      summary: List re-rate requests (RATER/ADMINISTRATOR, #140)
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, APPROVED, DENIED]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: A page of requests plus the total
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingRequestPageResponse'
        '403':
          description: Caller is not a RATER/ADMINISTRATOR

  /api/v1/rating-requests/me:
    get:
      summary: The caller's most recent re-rate request (#140)
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The caller's latest request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingRequestResponse'
        '204':
          description: The caller has never raised a request
        '403':
          description: No account

  /api/v1/rating-requests/{id}/approve:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Approve a re-rate request — apply a new rating (RATER/ADMINISTRATOR, #140)
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveRatingRequestRequest'
      responses:
        '200':
          description: The resolved (APPROVED) request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingRequestResponse'
        '400':
          description: Invalid NTRP rating
        '403':
          description: Caller is not a RATER/ADMINISTRATOR
        '404':
          description: No such request
        '409':
          description: The request is already resolved

  /api/v1/rating-requests/{id}/deny:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Deny a re-rate request with a reason (RATER/ADMINISTRATOR, #140)
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DenyRatingRequestRequest'
      responses:
        '200':
          description: The resolved (DENIED) request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingRequestResponse'
        '400':
          description: A reason is required
        '403':
          description: Caller is not a RATER/ADMINISTRATOR
        '404':
          description: No such request
        '409':
          description: The request is already resolved

  /api/v1/clubs:
    post:
      summary: Create a club
      description: ADMINISTRATOR only (#313). Creates a club that events can later be assigned to.
      tags:
        - Clubs
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClubRequest'
      responses:
        '201':
          description: The created club
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubResponse'
        '400':
          description: Invalid body (e.g. blank name)
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not an ADMINISTRATOR
    get:
      summary: List clubs
      description: Staff (HOST/CLUB_OWNER/ADMINISTRATOR, #313) — e.g. to pick a club when creating an event. All active clubs, alphabetical, with owners.
      tags:
        - Clubs
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClubResponse'
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/clubs/code/{code}:
    parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get a club's public page by code (#327)
      description: >-
        Read-only public summary of a club resolved by its shareable public code: the club's name plus
        the events it organizes, split into upcoming and past by end date. Viewable without login
        (#193); no owner or roster PII is exposed.
      tags:
        - Clubs
      security:
        - firebaseAuth: []
        - {}
      responses:
        '200':
          description: The public club summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubPublicResponse'
        '404':
          description: No club with that code

  /api/v1/clubs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Rename a club
      description: ADMINISTRATOR only (#325). Renames the club; the name is validated (non-blank) and trimmed.
      tags:
        - Clubs
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClubRequest'
      responses:
        '200':
          description: The updated club
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubResponse'
        '400':
          description: Invalid body (e.g. blank name) or malformed id
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such club
    delete:
      summary: Delete a club
      description: >-
        ADMINISTRATOR only (#325). Soft-deletes the club (is_active → false), like users and events:
        it drops out of the club list but the row and its event associations are kept for history.
      tags:
        - Clubs
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: The club was deleted
        '400':
          description: Malformed id
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such club (or already deleted)

  /api/v1/clubs/{id}/owners:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Assign a club owner
      description: >-
        ADMINISTRATOR only (#313). Records an existing user as an owner of this club. Granting the
        CLUB_OWNER capability is a separate admin action.
      tags:
        - Clubs
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignOwnerRequest'
      responses:
        '200':
          description: The updated club
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubResponse'
        '400':
          description: Invalid body, malformed id, or unknown/inactive user
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such club

  /api/v1/clubs/{id}/owners/{userId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      summary: Remove a club owner
      description: ADMINISTRATOR only (#313). Removes the user as an owner of this club (no-op if absent).
      tags:
        - Clubs
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The updated club
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubResponse'
        '400':
          description: Malformed id
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such club

  /api/v1/theme:
    get:
      summary: Get the global UI theme (#378)
      description: >-
        The single global UI theme the web reads to skin itself. Publicly readable (viewable without
        login, #378) so unauthenticated pages can theme themselves; defaults to AUTO when unset.
      tags:
        - Settings
      security:
        - firebaseAuth: []
        - {}
      responses:
        '200':
          description: The current global theme
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemeResponse'
    put:
      summary: Set the global UI theme (#378)
      description: ADMINISTRATOR only (#378). Sets the global UI theme; the write is audit-logged.
      tags:
        - Settings
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetThemeRequest'
      responses:
        '200':
          description: The updated global theme
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemeResponse'
        '400':
          description: Unknown theme value
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/settings/standings-source:
    get:
      summary: Get the standings serving source (#146)
      description: >-
        Which snapshot source the Standings tab serves (RATING or POINTS). Readable so the Admin tab can
        show the current value; defaults to RATING when unset.
      tags:
        - Settings
      security:
        - firebaseAuth: []
        - {}
      responses:
        '200':
          description: The current standings serving source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandingsSourceResponse'
    put:
      summary: Set the standings serving source (#146)
      description: ADMINISTRATOR only. Flips the served source between RATING and POINTS; the write is audit-logged.
      tags:
        - Settings
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetStandingsSourceRequest'
      responses:
        '200':
          description: The updated standings serving source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandingsSourceResponse'
        '400':
          description: Unknown standings source value
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/invites:
    post:
      summary: Invite an email to onboard (ADMINISTRATOR only)
      description: >-
        Records an onboarding invite for an email. Re-inviting a still-pending email rotates its
        7-day expiry (the "resend" affordance). The email-link itself is sent client-side via
        Firebase; this only records the invite the provisioning gate checks.
      tags:
        - Invites
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInviteRequest'
      responses:
        '201':
          description: Invite created (or the pending one rotated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteResponse'
        '400':
          description: Invalid email
        '403':
          description: Caller is not an ADMINISTRATOR
        '409':
          description: An account already exists with this email (active account)
    get:
      summary: List invites, paged (ADMINISTRATOR only)
      tags:
        - Invites
      security:
        - firebaseAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size (clamped to 1..100).
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of rows to skip (clamped to >= 0).
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, ACCEPTED, REVOKED]
          description: >-
            Filter to a single stored status. EXPIRED is not stored (it is a derived view of
            PENDING past its expiry), so use PENDING to scope to actionable invites. Omit for all.
      responses:
        '200':
          description: A page of invites plus the total count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitePageResponse'
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/invites/{id}:
    delete:
      summary: Revoke an invite (ADMINISTRATOR only)
      tags:
        - Invites
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Invite revoked
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such invite

  /api/v1/audit:
    get:
      summary: Read the audit log, newest first (ADMINISTRATOR only)
      description: >-
        The admin trace viewer (#102). Returns provenance entries newest-first, optionally scoped
        to a category, with actor (and user-typed target) ids resolved to display name + player
        code, and `occurredAt` as a UTC instant for the client to render in the viewer's timezone.
      tags:
        - Audit
      security:
        - firebaseAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum:
              - USER_CREATION
              - NAME_CHANGE
              - CONTACT_CHANGE
              - INVITE
              - MATCH_FIXTURE
              - MATCH_RESULT
              - CAPABILITY_CHANGE
              - RATING_CHANGE
              - RATING_CALCULATION
              - DUPLICATE_RECTIFICATION
              - CLUB_MANAGEMENT
              - EVENT_MANAGEMENT
          description: Scope to a single category; omit for all.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 5
          description: Page size (clamped to 1..100).
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Rows to skip (clamped to >= 0).
      responses:
        '200':
          description: A page of audit entries plus the total count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'
        '400':
          description: Unknown category
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/reports/band-hops:
    get:
      summary: NTRP band-hop report over a date range (ADMINISTRATOR only)
      description: >-
        For each rated player (#216), compares the NTRP band they were in entering the window with the
        band at its close and buckets players by the absolute number of 0.5-wide bands moved (0 = stayed
        in band). Confirms that most players stay in band and surfaces the exceptions who jumped. Band
        labels only — never exact ratings.
      tags:
        - Reports
      security:
        - firebaseAuth: []
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Window start (inclusive), ISO-8601 yyyy-MM-dd.
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Window end (inclusive), ISO-8601 yyyy-MM-dd.
      responses:
        '200':
          description: The band-hop report for the range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BandHopReportResponse'
        '400':
          description: Missing/invalid date, or endDate before startDate
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/audit/{id}/comment:
    patch:
      summary: Set or clear an administrator's note on an audit entry (ADMINISTRATOR only)
      description: The one mutable, un-audited field on an entry (#100). A blank comment clears it.
      tags:
        - Audit
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditCommentRequest'
      responses:
        '204':
          description: Comment set or cleared
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such audit entry

  /api/v1/duplicate-candidates:
    get:
      summary: List duplicate candidates for review (#126)
      description: ADMINISTRATOR only. Suspected same-person account pairs, newest first.
      tags:
        - Duplicates
      security:
        - firebaseAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [OPEN, DISMISSED, RESOLVED]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: A page of duplicate candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateCandidatePageResponse'
        '403':
          description: Caller is not an ADMINISTRATOR
    post:
      summary: Manually flag a duplicate candidate (#126)
      description: ADMINISTRATOR only. Flags a suspected pair (the "complaint" signal).
      tags:
        - Duplicates
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlagCandidateRequest'
      responses:
        '201':
          description: The flagged candidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateCandidateResponse'
        '400':
          description: Same user twice or a malformed id
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user

  /api/v1/duplicate-candidates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      summary: Dismiss a duplicate candidate (#126)
      description: ADMINISTRATOR only. Marks an open candidate DISMISSED (a false positive).
      tags:
        - Duplicates
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: Candidate dismissed
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such candidate
        '409':
          description: Candidate is not open

  /api/v1/duplicate-candidates/{id}/confirm:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Confirm a duplicate candidate (#126)
      description: ADMINISTRATOR only. Marks the non-canonical account a duplicate (via #124) and resolves the candidate.
      tags:
        - Duplicates
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmCandidateRequest'
      responses:
        '204':
          description: Candidate confirmed and resolved
        '400':
          description: canonicalId is not one of the candidate's accounts
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such candidate
        '409':
          description: Candidate is not open

  /api/v1/player-lists:
    get:
      summary: List the caller's player lists (#111)
      description: HOST/CLUB_OWNER/ADMINISTRATOR only. The caller's own named lists, newest first.
      tags:
        - Player Lists
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The caller's lists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerListSummaryResponse'
        '403':
          description: Caller cannot manage seeding lists
    post:
      summary: Create a named player list (#111)
      tags:
        - Player Lists
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlayerListRequest'
      responses:
        '201':
          description: The created list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerListSummaryResponse'
        '400':
          description: Missing list name
        '403':
          description: Caller cannot manage seeding lists

  /api/v1/player-lists/{id}:
    get:
      summary: Get a list with its members (#111)
      tags:
        - Player Lists
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The list and its members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerListResponse'
        '403':
          description: Not the caller's list
        '404':
          description: No such list
    delete:
      summary: Delete a list (#111)
      tags:
        - Player Lists
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '403':
          description: Not the caller's list
        '404':
          description: No such list

  /api/v1/player-lists/{id}/members:
    post:
      summary: Add a player to a list (#111)
      description: The target must have the PLAYER capability.
      tags:
        - Player Lists
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '204':
          description: Member added
        '400':
          description: Target is not a player, or a malformed id
        '403':
          description: Not the caller's list
        '404':
          description: No such list or user
        '409':
          description: Already a member

  /api/v1/player-lists/{id}/members/{userId}:
    delete:
      summary: Remove a player from a list (#111)
      tags:
        - Player Lists
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Member removed
        '403':
          description: Not the caller's list
        '404':
          description: Not a member

  /api/v1/player-lists/{id}/seeding:
    post:
      summary: Generate (or regenerate) a list's seeding (#111)
      description: >-
        Rating-sorted (highest first); the top ⌈N/2⌉ rated members get bracket seeds. Regenerating
        overwrites the previous seeding.
      tags:
        - Player Lists
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The generated seeding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedingResponse'
        '403':
          description: Not the caller's list
        '404':
          description: No such list
    get:
      summary: Get the current seeding for a list (#111)
      tags:
        - Player Lists
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The current seeding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedingResponse'
        '403':
          description: Not the caller's list
        '404':
          description: No seeding generated yet

  /api/v1/standings:
    get:
      summary: One page of the per-band standings (#113, #220)
      description: >-
        Interim, ratings-derived standings served from a persisted, published snapshot (#220). Returns
        one (band, sex) page ordered by rank, the group's total, and the (band, sex) selectors on offer.
        Readable by any signed-in player; the exact rating is returned only to RATER/ADMINISTRATOR
        viewers (#186). Omitting `band` defaults to the strongest available group (Men first). The
        snapshot is source-agnostic — points replace rating as the ordering source under #146 without
        changing this read path.
      tags:
        - Standings
      security:
        - firebaseAuth: []
      parameters:
        - name: band
          in: query
          required: false
          schema:
            type: string
          description: >-
            Band code to view (e.g. "4.0", "<3.0", "6.0+"); one of the codes listed in the response
            `groups`. Defaults to the strongest available band when omitted.
        - name: sex
          in: query
          required: false
          schema:
            type: string
          description: The group's sex ("Male"/"Female"); omit for the Unspecified group (#212).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
          description: Page size (default 25, capped at 100).
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Zero-based row offset within the (band, sex) group.
      responses:
        '200':
          description: One page of the selected (band, sex) group plus totals and selectors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandingsPageResponse'
  /api/v1/standings/me:
    get:
      summary: Locate the caller in the standings (jump-to-me, #220)
      description: >-
        Where the caller sits in the latest published snapshot — their (band, sex, rank) — plus the
        page offset (with the limit used) that contains their row, so the client can load exactly that
        page. 404 when the caller isn't in the current standings (e.g. unrated).
      tags:
        - Standings
      security:
        - firebaseAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
          description: Page size used to compute the containing page offset (default 25, capped at 100).
      responses:
        '200':
          description: The caller's location and the containing page offset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandingsLocateResponse'
        '404':
          description: The caller is not in the current standings

  /api/v1/standings/calculations:
    post:
      summary: Recompute the points-based standings (ADMINISTRATOR only, #146 phase 2)
      description: >-
        Rebuilds the standings snapshot from the ranking-points ledger (not ratings). It sums each
        active player's counting awards (ACTIVE and in their validity window as of now) per (band, sex)
        using the award's own band + sex tags (band-tagged, decision D2) and ranks each group by points
        descending, tie-broken by higher current rating then name. dryRun defaults to true (an empty
        body is a dry run) and previews with no writes; an explicit false publishes a POINTS snapshot,
        after which reads automatically prefer points over rating-derived standings. Scheduling is #389
        and tournament auto-awards are #390 — both out of scope here (this is the manual trigger).
      tags:
        - Standings
      security:
        - firebaseAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StandingsCalculationRequest'
      responses:
        '200':
          description: The recompute outcome (preview or committed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandingsCalculationResponse'
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/users/{userId}/ranking-points:
    post:
      summary: Grant a ranking-point award (#146)
      description: >-
        Admin-only. Append a ranking-point award to the user's ledger. The award is band-tagged at
        award time (band defaults to the target's current NTRP band, overridable) and sex-tagged from
        the target. Validity defaults from the point-class policy and is overridable. An external /
        ad-hoc grant (sourceType EXTERNAL) requires a reason for traceability.
      tags:
        - Ranking Points
      security:
        - firebaseAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantRankingPointsRequest'
      responses:
        '201':
          description: The created award
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingPointAwardResponse'
        '400':
          description: Validation error (non-positive points, missing reason, unknown class, bad band)
        '403':
          description: Not an administrator
    get:
      summary: List a user's ranking-point awards (#146)
      description: Admin-only. Every ledger row for the user, newest first (including REVOKED markers).
      tags:
        - Ranking Points
      security:
        - firebaseAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The user's ledger rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RankingPointAwardResponse'
        '403':
          description: Not an administrator
        '404':
          description: No such user

  /api/v1/ranking-points/{awardId}/revoke:
    post:
      summary: Revoke a ranking-point award (#146)
      description: >-
        Admin-only. Flip the original award to REVOKED and append a REVOKED marker row referencing it,
        keeping the ledger append-only. Idempotent: revoking an already-revoked or missing award is a 404.
      tags:
        - Ranking Points
      security:
        - firebaseAuth: []
      parameters:
        - name: awardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRankingPointsRequest'
      responses:
        '204':
          description: Revoked
        '403':
          description: Not an administrator
        '404':
          description: No active award with that id

  /api/v1/points/policies:
    get:
      summary: List the global points policies (#403 Phase B)
      description: >-
        The global master points policy, one entry per event type. Readable by points managers
        (ADMINISTRATOR is implicitly a points manager).
      tags:
        - Points Budget
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The per-type policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PointsPolicyResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not a points manager

  /api/v1/points/policies/{eventType}:
    put:
      summary: Set a global points policy (#403 Phase B)
      description: >-
        Points-manager only. Sets the per-match reward bounds and max validity days for one event
        type. Values are whole integers; min must not exceed max and all must be positive.
      tags:
        - Points Budget
      security:
        - firebaseAuth: []
      parameters:
        - name: eventType
          in: path
          required: true
          schema:
            type: string
            enum: [OPEN_PLAY, LEAGUE, TOURNAMENT]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPointsPolicyRequest'
      responses:
        '200':
          description: The updated policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PointsPolicyResponse'
        '400':
          description: Invalid event type or policy values
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not a points manager

  /api/v1/points/budgets:
    get:
      summary: List every club's per-type points budgets (#403 Phase B)
      description: >-
        Points-manager only. For each club and event type, the accounting view — budgeted (real),
        allocated (0 until reservations/awards land in Phase C/D), and free (budgeted minus allocated).
      tags:
        - Points Budget
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The per club and per-type budget accounting
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClubBudgetResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not a points manager

  /api/v1/clubs/{clubId}/point-budgets/{eventType}:
    put:
      summary: Set a club's per-type points budget (#403 Phase B)
      description: >-
        Points-manager only. Sets the club's budgeted points for one event type. The value must be a
        non-negative whole integer and the club must exist.
      tags:
        - Points Budget
      security:
        - firebaseAuth: []
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: eventType
          in: path
          required: true
          schema:
            type: string
            enum: [OPEN_PLAY, LEAGUE, TOURNAMENT]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetClubBudgetRequest'
      responses:
        '200':
          description: The updated budget accounting for that club and type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubBudgetResponse'
        '400':
          description: Invalid event type or a negative budget
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not a points manager
        '404':
          description: No such club

  /api/v1/clubs/{clubId}/points-summary:
    get:
      summary: A club's points summary for its owner (#403 Phase E)
      description: >-
        Returns the club's per-type utilization (Budgeted/Allocated/Free) plus a per-event breakdown
        (designated/awarded and whether the event is finalized). Gated to the club's CLUB_OWNER(s) or
        an ADMINISTRATOR/POINTS_MANAGER. Utilization is never exposed on the anonymous public club page.
      tags:
        - Points Budget
      security:
        - firebaseAuth: []
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The club's utilization and per-event points breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubPointsSummaryResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is neither an owner of this club nor a points manager
        '404':
          description: No such club

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase-issued ID token (RS256), verified against Google's public keys.
  schemas:
    RankingCalculationRequest:
      type: object
      required:
        - teams
        - matchScore
      properties:
        teams:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Team'
          description: Map of team IDs to Team objects (exactly 2 teams required)
        matchScore:
          $ref: '#/components/schemas/MatchScore'
        options:
          $ref: '#/components/schemas/RatingCalculationOptions'

    RankingCalculationResponse:
      type: object
      required:
        - ratingChanges
        - players
        - teams
      properties:
        ratingChanges:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RatingChange'
          description: Map of player IDs to rating changes
        players:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PlayerProfile'
          description: Map of player IDs to updated player profiles
        teams:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Team'
          description: Map of team IDs to updated teams with updated players

    PlayerProfile:
      type: object
      required:
        - playerId
        - name
        - rating
      properties:
        playerId:
          type: string
        name:
          type: string
        rating:
          $ref: '#/components/schemas/Rating'

    Team:
      type: object
      required:
        - teamId
        - name
        - players
      properties:
        teamId:
          type: string
          minLength: 1
          maxLength: 50
          description: Unique identifier for this team in the match context
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Team name (for singles - player name, for doubles - "Player1/Player2")
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerProfile'
          minItems: 1
          maxItems: 2
          description: List of players in this team (1 for singles, 2 for doubles)
        teamType:
          $ref: '#/components/schemas/TeamType'
          default: SINGLES
          description: Type of team (SINGLES, DOUBLES, or MIXED_DOUBLES)

    TeamType:
      type: string
      enum:
        - SINGLES
        - DOUBLES
        - MIXED_DOUBLES
      description: |
        Team type:
        - SINGLES: 1 player per team
        - DOUBLES: 2 players per team
        - MIXED_DOUBLES: 2 players per team (male + female)

    Rating:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          description: The numeric NTRP rating value (e.g., "4.5", "4.123456")
        publishedLevel:
          $ref: '#/components/schemas/Level'
          description: The published level (optional in request, always present in response)

    Level:
      type: object
      required:
        - value
        - minRating
        - maxRating
      properties:
        value:
          type: string
          description: The published NTRP level value (e.g., "4.5")
        minRating:
          type: string
          description: Minimum rating for this level (inclusive)
        maxRating:
          type: string
          description: Maximum rating for this level (exclusive)

    MatchScore:
      type: object
      required:
        - sets
      properties:
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SetScore'
        winnerTeamId:
          type: string
          description: Team ID of the match winner. Defaults to the team that won the most sets when omitted.
        loserTeamId:
          type: string
          description: Team ID of the match loser. Defaults to the team that lost the most sets when omitted; must differ from the winner and be one of the teams.

    SetScore:
      type: object
      required:
        - games
      properties:
        games:
          type: object
          additionalProperties:
            type: integer
        winnerTeamId:
          type: string
          description: Team ID of the set winner. Defaults to the team with the most games when omitted.
        loserTeamId:
          type: string
          description: Team ID of the set loser. Defaults to the team with the fewest games when omitted; must differ from the winner.
        tiebreak:
          $ref: '#/components/schemas/TiebreakScore'

    TiebreakScore:
      type: object
      required:
        - points
      description: |
        Informational only: documents how many points the tiebreak was (e.g. 7-5).
        The tiebreak is part of the set score, so its winner must be the set winner.
        Tiebreak points are not included in the dominance calculation of the match —
        only games count.
      properties:
        points:
          type: object
          additionalProperties:
            type: integer
        winnerTeamId:
          type: string
          description: Team ID of the tiebreak winner. Defaults to the team with the most points when omitted.
        loserTeamId:
          type: string
          description: Team ID of the tiebreak loser. Defaults to the team with the fewest points when omitted; must differ from the winner.

    RatingCalculationOptions:
      type: object
      properties:
        smoothingEnabled:
          type: boolean
          default: false
        smoothingFactor:
          type: number
          format: double
          default: 0.5

    RatingChange:
      type: object
      required:
        - change
        - previousRating
        - newRating
        - percentChange
        - levelChanged
      properties:
        change:
          type: string
          description: The absolute rating change (e.g., "+0.123456" or "-0.045678")
        previousRating:
          $ref: '#/components/schemas/Rating'
          description: The player's rating before the match
        newRating:
          $ref: '#/components/schemas/Rating'
          description: The player's rating after the match (includes updated publishedLevel)
        percentChange:
          type: string
          description: The percentage change in rating (e.g., "+2.75%")
        levelChanged:
          type: boolean
          description: Whether the player's published level changed (e.g., 4.0 → 4.5)

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    NameDto:
      type: object
      required:
        - id
        - type
        - value
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [FIRST, MIDDLE, LAST, SUFFIX, NICKNAME, PREFERRED, FULL, GOVERNMENT, DISPLAY]
        value:
          type: string
        isActive:
          type: boolean
          default: true

    ContactDto:
      type: object
      required:
        - id
        - type
        - value
        - source
        - status
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        source:
          type: string
          enum: [GOOGLE, FACEBOOK, MANUAL]
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]
        isPrimary:
          type: boolean
        isActive:
          type: boolean

    IdentityDto:
      type: object
      required:
        - provider
        - providerUid
      properties:
        provider:
          type: string
          enum: [GOOGLE, FACEBOOK, PASSWORD]
        providerUid:
          type: string
        isPrimary:
          type: boolean

    MarkDuplicatesRequest:
      type: object
      description: The users to mark as duplicates of the canonical account in the path (#124).
      required:
        - duplicateIds
      properties:
        duplicateIds:
          type: array
          items:
            type: string
            format: uuid

    CreateUserRequest:
      type: object
      description: |
        Profile details the client supplies. Identity and email come from the verified
        token and are ignored if present here. dateOfBirth and sex are required — every
        member supplies them at sign-up because they drive tournament-category eligibility.
        displayName is the single name shown in the UI; if omitted, the token's name
        (Google/Facebook) is used. Structured names (FIRST/LAST/nicknames) come later.
      required:
        - dateOfBirth
        - sex
        - proposedRating
      properties:
        displayName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          description: ISO-8601 (yyyy-MM-dd)
        sex:
          type: string
          enum: [Male, Female]
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-2 (defaults to PH)
        proposedRating:
          type: string
          description: Required self-reported NTRP rating (1.0–7.0) for a rater to approve/override.

    ProfileRequest:
      type: object
      description: |
        Mutable profile fields. PATCH leaves omitted (null) fields unchanged;
        PUT replaces all of them (omitted fields are cleared). The profile photo
        is set separately via PUT /api/v1/users/{id}/photo (#303).
      properties:
        dateOfBirth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
          enum: [Male, Female]
        city:
          type: string
          nullable: true

    PhotoSettingsRequest:
      type: object
      description: |
        Profile-photo controls (#303). A blank/absent customPhotoUrl clears the custom photo
        (reverting to the OAuth photo); a non-blank value must be an http(s) URL. hidden suppresses
        the photo everywhere. Neither is overwritten by the login-time OAuth photo sync.
      properties:
        customPhotoUrl:
          type: string
          nullable: true
          description: Public http(s) image URL to show instead of the OAuth photo; blank/absent clears it.
        hidden:
          type: boolean
          default: false
          description: When true, the profile photo is suppressed everywhere.

    PublicPlayerResponse:
      type: object
      description: Privacy-conscious player card resolved from a public code (auth-gated deep link).
      required:
        - publicCode
      properties:
        publicCode:
          type: string
          description: Short, human-readable, shareable player code (e.g. "K7Q2MX").
        displayName:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        rating:
          nullable: true
          type: object
          required:
            - value
          properties:
            value:
              type: string
            level:
              type: string
              nullable: true
            confidence:
              type: string
              nullable: true
              description: Computed rating confidence 0..1 (#343), shown as a %; 0 when not match-derived.
        isDisabled:
          type: boolean
          description: True when this profile was marked a duplicate and disabled (#124); the card is a "merged" notice.
        canonical:
          nullable: true
          description: When disabled, the canonical ("true") account to link to.
          type: object
          required:
            - publicCode
          properties:
            publicCode:
              type: string
            displayName:
              type: string
              nullable: true
            photoUrl:
              type: string
              nullable: true

    PlayerMatchHistoryEntry:
      type: object
      description: One row of a player's match history. Ratings shown only as the published NTRP band, and only when rated.
      required:
        - matchId
        - publicCode
        - matchDate
        - status
        - rated
        - setScores
        - partners
        - opponents
      properties:
        matchId:
          type: string
          format: uuid
        publicCode:
          type: string
          description: The match's shareable public code; link a history row to /matches/{publicCode}.
        matchDate:
          type: string
          format: date
        status:
          type: string
          description: Match lifecycle status (SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED).
        rated:
          type: boolean
          description: True once the match has been calculated and contributes to the current rating.
        result:
          type: string
          nullable: true
          description: WIN or LOSS from this player's perspective; null when there is no recorded winner yet.
        setScores:
          type: array
          description: Set scores oriented as "playerGames-opponentGames"; empty until a result is recorded.
          items:
            type: string
        partners:
          type: array
          description: The player's teammate(s) — empty for singles, one entry for doubles.
          items:
            $ref: '#/components/schemas/MatchHistoryParticipant'
        opponents:
          type: array
          description: The opposing side — one player for singles, two for doubles.
          items:
            $ref: '#/components/schemas/MatchHistoryParticipant'
        playerLevelAtMatch:
          type: string
          nullable: true
          description: This player's published NTRP band at the time of the match (rated matches only).
        playerConfidence:
          type: string
          nullable: true
          description: The player's current rating confidence 0..1 (#343), shown as a %; 0 when not match-derived.

    PlayerMatchHistoryPage:
      type: object
      description: A page of a player's match history (#284) — the requested slice plus the total matching count.
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PlayerMatchHistoryEntry'
        total:
          type: integer
          description: Count of matches matching the (optional) search, for numbered pagination.

    MatchHistoryParticipant:
      type: object
      description: A teammate or opponent on a match-history row, with their NTRP band at the time of the match.
      required:
        - publicCode
      properties:
        publicCode:
          type: string
        displayName:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        levelAtMatch:
          type: string
          nullable: true
          description: This participant's published NTRP band at the time of the match (rated matches only).
        confidence:
          type: string
          nullable: true
          description: This participant's current rating confidence 0..1 (#343), shown as a %; 0 when not match-derived.

    PlayerResultsSummary:
      type: object
      description: A player's win–loss record over time (#276), split into singles and doubles; one bucket per month, oldest first.
      required:
        - singles
        - doubles
      properties:
        singles:
          type: array
          items:
            $ref: '#/components/schemas/ResultsBucket'
        doubles:
          type: array
          items:
            $ref: '#/components/schemas/ResultsBucket'

    ResultsBucket:
      type: object
      description: Win/loss counts for one calendar month, from the viewed player's perspective.
      required:
        - period
        - wins
        - losses
      properties:
        period:
          type: string
          description: The calendar month as "yyyy-MM".
        wins:
          type: integer
        losses:
          type: integer

    PlayerStandingResponse:
      type: object
      description: A player's current band+sex rank and points under the active standings source (#448).
      required:
        - band
        - bandLabel
        - rank
        - points
        - source
      properties:
        band:
          type: string
          description: The band's persisted code (e.g. "4.0").
        bandLabel:
          type: string
          description: The band's UI header label (e.g. "NTRP 4.0 Band Race").
        sex:
          type: string
          nullable: true
          description: The sex group (Male, Female, or null for Unspecified).
        rank:
          type: integer
          description: 1-based rank within the (band, sex) group.
        points:
          type: string
          description: Points backing the rank as a decimal string (the current rating for RATING, snapshot points for POINTS).
        source:
          type: string
          description: Which race this rank is for (#424); RATING or POINTS.

    ActivePointsAwardResponse:
      type: object
      description: One ACTIVE ranking-point award on a player's points audit (#448), linked to its granting match.
      required:
        - id
        - points
        - band
        - pointClass
        - validUntil
      properties:
        id:
          type: string
          format: uuid
        points:
          type: string
          description: The award's points as a decimal string.
        band:
          type: string
          description: The NTRP band tagged on the award (e.g. "4.0").
        pointClass:
          type: string
          description: The point class (e.g. SEASONAL_TOURNAMENT_3M, ANNUAL_TOURNAMENT).
        validUntil:
          type: string
          description: The award's expiry (exclusive end of its validity window) as an ISO date-time.
        matchCode:
          type: string
          nullable: true
          description: The granting match's public code; link to /matches/{matchCode}. Null for manual or pre-V19 awards.
        eventCode:
          type: string
          nullable: true
          description: Fallback event code when there is no match link; link to /events/{eventCode}.

    UserSummaryPageResponse:
      type: object
      description: A page of user-search results plus the total match count, for numbered pagination (#232).
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserSummaryResponse'
        total:
          type: integer

    UserSummaryResponse:
      type: object
      description: >-
        Slim user shape for search results (player picker, role grants, research). Carries the
        current NTRP rating and a computed age; raw date of birth is withheld for privacy (#64).
      required:
        - id
        - publicCode
        - capabilities
      properties:
        id:
          type: string
          format: uuid
        publicCode:
          type: string
          description: Short, human-readable, shareable player code (e.g. "K7Q2MX").
        displayName:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        sex:
          type: string
          nullable: true
          enum: [Male, Female]
        age:
          type: integer
          nullable: true
          description: Whole years as of today, computed from date of birth.
        rating:
          nullable: true
          type: object
          required:
            - value
          properties:
            value:
              type: string
            level:
              type: string
              nullable: true
            confidence:
              type: string
              nullable: true
              description: Computed rating confidence 0..1 (#343), shown as a %; 0 when not match-derived.
        capabilities:
          type: array
          items:
            type: string
            enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR, RATER, RESEARCHER, POINTS_MANAGER]
        record:
          nullable: true
          type: object
          description: Decided win–loss record, singles + doubles combined (#342); populated for research results, else absent.
          required:
            - wins
            - losses
            - total
          properties:
            wins:
              type: integer
            losses:
              type: integer
            total:
              type: integer
              description: Total decided matches (wins + losses).

    UserResponse:
      type: object
      required:
        - id
        - publicCode
        - country
        - kycVerified
        - isActive
        - names
        - contacts
        - identities
        - capabilities
      properties:
        id:
          type: string
          format: uuid
        publicCode:
          type: string
          description: Short, human-readable, shareable player code (e.g. "K7Q2MX").
        firebaseUid:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
          description: Effective photo to display — respects the hide flag and custom URL (#303).
        customPhotoUrl:
          type: string
          nullable: true
          description: User-set public image URL, if any (#303).
        photoHidden:
          type: boolean
          default: false
          description: When true, the profile photo is suppressed everywhere (#303).
        dateOfBirth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
        kycVerified:
          type: boolean
        isActive:
          type: boolean
        canonicalUserId:
          type: string
          format: uuid
          nullable: true
          description: When set, this user is a disabled duplicate of the referenced canonical account (#124).
        names:
          type: array
          items:
            $ref: '#/components/schemas/NameDto'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactDto'
        identities:
          type: array
          items:
            $ref: '#/components/schemas/IdentityDto'
        capabilities:
          type: array
          items:
            type: string
            enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR, RATER, RESEARCHER, POINTS_MANAGER]

    ContactCreateRequest:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        isPrimary:
          type: boolean
          default: true

    ContactStateRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean

    VerificationRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          description: Defaults to ADMIN_OVERRIDE when status is VERIFIED.
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]

    ContactResponse:
      type: object
      required:
        - id
        - userId
        - type
        - value
        - source
        - status
        - isPrimary
        - isActive
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        source:
          type: string
          enum: [GOOGLE, FACEBOOK, MANUAL]
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]
        isPrimary:
          type: boolean
        isActive:
          type: boolean
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        verifiedBy:
          type: string
          format: uuid
          nullable: true
        disabledAt:
          type: string
          format: date-time
          nullable: true

    NameCreateRequest:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          description: DISPLAY, FIRST, and LAST replace the user's current active name of that type.
          enum: [FIRST, MIDDLE, LAST, SUFFIX, NICKNAME, PREFERRED, FULL, GOVERNMENT, DISPLAY]
        value:
          type: string

    NameStateRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean

    NameResponse:
      type: object
      required:
        - id
        - userId
        - type
        - value
        - isActive
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: [FIRST, MIDDLE, LAST, SUFFIX, NICKNAME, PREFERRED, FULL, GOVERNMENT, DISPLAY]
        value:
          type: string
        isActive:
          type: boolean
        disabledAt:
          type: string
          format: date-time
          nullable: true

    CapabilityGrantRequest:
      type: object
      required:
        - capability
      properties:
        capability:
          type: string
          enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR, RATER, RESEARCHER, POINTS_MANAGER]

    CapabilityResponse:
      type: object
      required:
        - capability
        - isActive
      properties:
        capability:
          type: string
          enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR, RATER, RESEARCHER, POINTS_MANAGER]
        isActive:
          type: boolean
        grantedBy:
          type: string
          format: uuid
          nullable: true
        grantedAt:
          type: string
          format: date-time
          nullable: true
        revokedBy:
          type: string
          format: uuid
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true

    SetRatingRequest:
      type: object
      description: >-
        Set a user's NTRP rating. Provide `band` (the normal path) to store the band midpoint
        (floor + 0.25), or `value` for a precise override. Exactly one is required.
      properties:
        band:
          type: string
          nullable: true
          description: >-
            NTRP band 1.0–7.0 (0.5 steps); stored as the band midpoint (e.g. 3.5 → 3.75) so an
            initial rating sits centered in its band rather than at the edge.
        value:
          type: string
          nullable: true
          description: Precise NTRP value (1.0–7.0) for an override; stored as-is.

    UserRatingResponse:
      type: object
      required:
        - confidence
        - matchesPlayed
      properties:
        value:
          type: string
          nullable: true
          description: >-
            The exact rating — privacy-withheld from players (#64/#114); present only for a rating
            manager (ADMINISTRATOR). Players receive the band (level) and bandPosition instead.
        level:
          type: string
          nullable: true
        bandPosition:
          type: number
          format: double
          nullable: true
          description: >-
            Normalized 0..1 position within the current NTRP band (floor 0 → ceiling 1) for the
            own-profile "speed meter" (#114). Never reveals the exact rating.
        confidence:
          type: string
          description: >-
            Computed rating confidence 0..1 (#343), shown as a %: log-logistic time decay since the
            last match calc, ramped over ~5 matches; 0 when the rating isn't match-derived.
        matchesPlayed:
          type: integer
        lastMatchDate:
          type: string
          format: date
          nullable: true

    RatingHistoryResponse:
      type: object
      required:
        - id
        - previousRating
        - newRating
        - ratingChange
        - levelChanged
        - smoothingApplied
        - calculatedAt
      properties:
        id:
          type: string
          format: uuid
        matchId:
          type: string
          format: uuid
          nullable: true
        previousRating:
          type: string
        newRating:
          type: string
        ratingChange:
          type: string
        percentChange:
          type: string
          nullable: true
        previousLevel:
          type: string
          nullable: true
        newLevel:
          type: string
          nullable: true
        levelChanged:
          type: boolean
        dominanceFactor:
          type: string
          nullable: true
        smoothingApplied:
          type: boolean
        smoothingFactor:
          type: string
          nullable: true
        setBreakdown:
          type: array
          description: Per-set calculation steps (#110); empty for v1/initial/pre-#110 rows.
          items:
            $ref: '#/components/schemas/SetBreakdownResponse'
        calculatedAt:
          type: string
          format: date-time

    PendingAssessmentResponse:
      type: object
      required:
        - userId
        - publicCode
      properties:
        userId:
          type: string
          format: uuid
        publicCode:
          type: string
          description: Short shareable player code; link the card to /players/{publicCode}.
        displayName:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        sex:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        age:
          type: integer
          nullable: true
          description: Whole years as of today, computed from dateOfBirth.
        proposedRating:
          type: string
          nullable: true
          description: The player's self-reported NTRP band at sign-up, if any (admins approve/override).

    PendingAssessmentPageResponse:
      type: object
      description: A page of pending assessments plus the total count of all pending users.
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PendingAssessmentResponse'
        total:
          type: integer

    CreateRatingRequestRequest:
      type: object
      required:
        - justification
      properties:
        justification:
          type: string

    ApproveRatingRequestRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: string
          description: The new NTRP rating to apply (1.0–7.0).

    DenyRatingRequestRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    RatingRequestResponse:
      type: object
      description: A player's re-rate request and its resolution (#140).
      required:
        - id
        - userId
        - status
        - justification
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, APPROVED, DENIED]
        justification:
          type: string
        newRating:
          type: string
          nullable: true
          description: The approved rating as its published NTRP band (never the raw value).
        reason:
          type: string
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        requester:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AuditPersonResponse'

    RatingRequestPageResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RatingRequestResponse'
        total:
          type: integer

    CreateFixtureRequest:
      type: object
      required:
        - matchFormat
        - matchType
        - matchDate
        - team1
        - team2
      properties:
        matchFormat:
          type: string
          enum: [SINGLES, DOUBLES, MIXED_DOUBLES]
        matchType:
          type: string
          enum: [OPEN_PLAY, LEAGUE_PLAY, TOURNAMENT_INITIAL_ROUND, LEAGUE_PLAYOFFS, TOURNAMENT_PLAYOFFS]
          description: The competitive context; scales the calculated rating change by a per-match-type factor (#108).
        matchDate:
          type: string
          format: date
        team1:
          type: array
          items:
            type: string
            format: uuid
        team2:
          type: array
          items:
            type: string
            format: uuid
        venue:
          type: string
          nullable: true
        tournamentName:
          type: string
          nullable: true
        eventId:
          type: string
          format: uuid
          nullable: true
          description: When set, the fixture belongs to this event and both sides must be participants (#138).
        designatedPoints:
          type: integer
          nullable: true
          description: >-
            Points designated for the winner (#403 Phase C), for a fixture on an event that has a points
            config (any type with a club; OPEN_PLAY unified). Omit on such an event to default to
            round(avg(event min, event max)); ignored for a config-less or event-less fixture.

    SetScoreRequest:
      type: object
      description: >-
        One set's score. Games are non-negative; a set decided on games must be won with at least
        4 games (#213) — standard tennis is 6, but a lower floor of 4 allows shortened formats.
        Sets with equal games are decided by the tiebreak and are exempt from that floor.
      required:
        - team1Games
        - team2Games
      properties:
        team1Games:
          type: integer
        team2Games:
          type: integer
        tiebreakTeam1Points:
          type: integer
          nullable: true
        tiebreakTeam2Points:
          type: integer
          nullable: true

    MatchResultRequest:
      type: object
      required:
        - sets
      properties:
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SetScoreRequest'

    MatchStateRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean

    ReorderMatchesRequest:
      type: object
      required:
        - matchIds
      properties:
        matchIds:
          type: array
          description: Same-date match ids in the desired calculation order (#331/#332).
          items:
            type: string
            format: uuid

    MatchSideResponse:
      type: object
      required:
        - teamId
        - userIds
      properties:
        teamId:
          type: string
          format: uuid
        userIds:
          type: array
          items:
            type: string
            format: uuid

    MatchSetResponse:
      type: object
      required:
        - setNumber
        - team1Games
        - team2Games
        - winnerTeamId
      properties:
        setNumber:
          type: integer
        team1Games:
          type: integer
        team2Games:
          type: integer
        winnerTeamId:
          type: string
          format: uuid
        tiebreakTeam1Points:
          type: integer
          nullable: true
        tiebreakTeam2Points:
          type: integer
          nullable: true

    MatchResponse:
      type: object
      required:
        - id
        - publicCode
        - matchFormat
        - matchType
        - matchDate
        - status
        - team1
        - team2
        - sets
        - isActive
      properties:
        id:
          type: string
          format: uuid
        publicCode:
          type: string
          description: Stable, shareable public code for the match (#136).
        matchFormat:
          type: string
          enum: [SINGLES, DOUBLES, MIXED_DOUBLES]
        matchType:
          type: string
          enum: [OPEN_PLAY, LEAGUE_PLAY, TOURNAMENT_INITIAL_ROUND, LEAGUE_PLAYOFFS, TOURNAMENT_PLAYOFFS]
          description: The competitive context the match was played under (#108).
        matchDate:
          type: string
          format: date
        status:
          type: string
          enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]
        team1:
          $ref: '#/components/schemas/MatchSideResponse'
        team2:
          $ref: '#/components/schemas/MatchSideResponse'
        winnerTeamId:
          type: string
          format: uuid
          nullable: true
        sets:
          type: array
          items:
            $ref: '#/components/schemas/MatchSetResponse'
        venue:
          type: string
          nullable: true
        tournamentName:
          type: string
          nullable: true
        isActive:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        ratedAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
          format: uuid
          nullable: true
        recordedBy:
          type: string
          format: uuid
          nullable: true
        eventId:
          type: string
          format: uuid
          nullable: true
          description: The event this fixture belongs to, if any (#138).
        designatedPoints:
          type: integer
          nullable: true
          description: Points designated for the winner (#403 Phase C); null for a config-less or event-less fixture.

    CreateEventRequest:
      type: object
      required:
        - name
        - startDate
        - endDate
      properties:
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        participantIds:
          type: array
          items:
            type: string
            format: uuid
        clubId:
          type: string
          format: uuid
          nullable: true
          description: Optional club to file the event under (#313); omit for a clubless ("Open") event.
        type:
          type: string
          nullable: true
          enum: [OPEN_PLAY, LEAGUE, TOURNAMENT]
          description: Event class (#403); omit for the OPEN_PLAY default.
        minPointsPerMatch:
          type: integer
          nullable: true
          description: >-
            Min per-match reward (#403 Phase C). Required (with all four points fields) for an event of any type
            that has a club (OPEN_PLAY unified); a clubless event may omit them and set the config later (#429).
        maxPointsPerMatch:
          type: integer
          nullable: true
          description: >-
            Max per-match reward (#403 Phase C). Required (with all four points fields) for an event of any type
            that has a club (OPEN_PLAY unified); a clubless event may omit them and set the config later (#429).
        pointValidityStart:
          type: string
          format: date
          nullable: true
          description: First day an awarded point is valid (#403 Phase C); required for a budgeted-type event that has a club (#429).
        pointValidityEnd:
          type: string
          format: date
          nullable: true
          description: Last day an awarded point is valid (#403 Phase C); required for a budgeted-type event that has a club (#429).

    SetPointsConfigRequest:
      type: object
      description: Set a budgeted event's per-match reward window and point validity window (#403 Phase C).
      required:
        - minPointsPerMatch
        - maxPointsPerMatch
        - pointValidityStart
        - pointValidityEnd
      properties:
        minPointsPerMatch:
          type: integer
          description: Min per-match reward; validated against the global per-type policy.
        maxPointsPerMatch:
          type: integer
          description: Max per-match reward; validated against the global per-type policy.
        pointValidityStart:
          type: string
          format: date
        pointValidityEnd:
          type: string
          format: date

    UpdateEventRequest:
      type: object
      description: Partial update of an event (#269). Only the name is editable today; fields left unset are unchanged.
      properties:
        name:
          type: string
          description: The new event name (non-blank; trimmed).

    SetEventClubRequest:
      type: object
      description: Set the event's club (#319); clubId null/absent clears it (event becomes "Open").
      properties:
        clubId:
          type: string
          format: uuid
          nullable: true
          description: The club to assign, or null to remove the event's club.

    SetCalcPriorityRequest:
      type: object
      required:
        - priority
      description: Set an event's rating-calculation processing priority (#335).
      properties:
        priority:
          type: number
          format: double
          description: The processing key (end-date epoch-day scale); lower = processed earlier.

    AddParticipantRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid

    DecideParticipantRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [APPROVED, HOLD]
          description: The host's decision on a participant request (#201).

    EventParticipantResponse:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          nullable: true
        publicCode:
          type: string
          nullable: true
        sex:
          type: string
          nullable: true
          enum: [Male, Female]
        age:
          type: integer
          nullable: true
          description: Whole years as of today, computed from date of birth.
        rating:
          nullable: true
          type: object
          required:
            - value
          properties:
            value:
              type: string
            level:
              type: string
              nullable: true
            confidence:
              type: string
              nullable: true
              description: Computed rating confidence 0..1 (#343), shown as a %; 0 when not match-derived.
        status:
          type: string
          nullable: true
          enum: [APPROVED, PENDING, HOLD]
          description: Participant standing (#201); null on the public roster (approved only).

    MyEventResponse:
      type: object
      description: One of the caller's own events (#202) with their standing in it.
      required:
        - publicCode
        - name
        - startDate
        - endDate
        - status
      properties:
        publicCode:
          type: string
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [APPROVED, PENDING, HOLD]

    EventResponse:
      type: object
      required:
        - id
        - publicCode
        - name
        - startDate
        - endDate
        - isActive
        - participants
        - type
      properties:
        id:
          type: string
          format: uuid
        publicCode:
          type: string
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isActive:
          type: boolean
        participants:
          type: array
          items:
            $ref: '#/components/schemas/EventParticipantResponse'
        creatorDisplayName:
          type: string
          nullable: true
          description: The filing host's display name (#270); null for legacy events with no recorded creator.
        creatorPublicCode:
          type: string
          nullable: true
          description: The filing host's public code (#270), for linking to their profile; null if unknown.
        clubId:
          type: string
          format: uuid
          nullable: true
          description: The event's club (#313); null for a clubless event.
        clubName:
          type: string
          nullable: true
          description: The event's club name (#313), for grouping/display; null for a clubless event.
        calcPriority:
          type: number
          format: double
          nullable: true
          description: Admin override for calculation processing order (#335); null = order by end date.
        type:
          type: string
          enum: [OPEN_PLAY, LEAGUE, TOURNAMENT]
          description: The event's class (#403).
        finalizedAt:
          type: string
          format: date-time
          nullable: true
          description: When the event was finalized (#403); null while open.
        isFinalized:
          type: boolean
          description: True once the event is finalized (#403) — closed to changes; its matches queue for rating.
        minPointsPerMatch:
          type: integer
          nullable: true
          description: Min per-match reward (#403 Phase C); null for a config-less (clubless) event.
        maxPointsPerMatch:
          type: integer
          nullable: true
          description: Max per-match reward (#403 Phase C); null for a config-less (clubless) event.
        pointValidityStart:
          type: string
          format: date
          nullable: true
          description: First day an awarded point is valid (#403 Phase C); null for a config-less (clubless) event.
        pointValidityEnd:
          type: string
          format: date
          nullable: true
          description: Last day an awarded point is valid (#403 Phase C); null for a config-less (clubless) event.

    EventPublicResponse:
      type: object
      description: Read-only public summary of an event (#138) — details, roster, and its matches.
      required:
        - publicCode
        - name
        - startDate
        - endDate
        - participants
        - matches
      properties:
        publicCode:
          type: string
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        clubName:
          type: string
          nullable: true
          description: The organizing club's name (#313), read-only; null for a clubless ("Open") event.
        isActive:
          type: boolean
          description: False once the event is soft-deleted (#325); the public page flags it as deleted.
        participants:
          type: array
          items:
            $ref: '#/components/schemas/EventParticipantResponse'
        matches:
          type: array
          items:
            $ref: '#/components/schemas/MatchPublicResponse'
        viewerStatus:
          type: string
          nullable: true
          enum: [APPROVED, PENDING, HOLD]
          description: The viewer's own standing on this event (#201); null if not signed up.

    MatchPublicPlayer:
      type: object
      description: One player on the public match page (#136) — name + shareable code only.
      properties:
        displayName:
          type: string
          nullable: true
        publicCode:
          type: string
          nullable: true

    UpcomingMatchResponse:
      type: object
      description: A caller's upcoming (scheduled) match for their private profile (#251).
      required:
        - publicCode
        - matchDate
        - matchType
        - opponents
      properties:
        publicCode:
          type: string
        matchDate:
          type: string
          format: date
        matchType:
          type: string
        venue:
          type: string
          nullable: true
        opponents:
          type: array
          items:
            $ref: '#/components/schemas/MatchPublicPlayer'

    MatchPublicSet:
      type: object
      required:
        - setNumber
        - team1Games
        - team2Games
      properties:
        setNumber:
          type: integer
        team1Games:
          type: integer
        team2Games:
          type: integer
        tiebreakTeam1Points:
          type: integer
          nullable: true
        tiebreakTeam2Points:
          type: integer
          nullable: true

    MatchPublicResponse:
      type: object
      description: Read-only public summary of a match (#136), addressed by its public code.
      required:
        - publicCode
        - matchFormat
        - matchType
        - matchDate
        - status
        - team1
        - team2
        - winner
        - sets
      properties:
        publicCode:
          type: string
        matchFormat:
          type: string
        matchType:
          type: string
        matchDate:
          type: string
          format: date
        status:
          type: string
        rated:
          type: boolean
          description: >-
            True once the rating calculation has committed this match (#361); lets a list view
            derive the Scheduled / Awaiting rating / Rated status without the precise rating changes.
        isActive:
          type: boolean
          description: False once the match is soft-deleted (#325); the public page flags it as deleted.
        team1:
          type: array
          items:
            $ref: '#/components/schemas/MatchPublicPlayer'
        team2:
          type: array
          items:
            $ref: '#/components/schemas/MatchPublicPlayer'
        winner:
          type: string
          enum: [TEAM1, TEAM2, NONE]
        sets:
          type: array
          items:
            $ref: '#/components/schemas/MatchPublicSet'
        venue:
          type: string
          nullable: true
        tournamentName:
          type: string
          nullable: true
        ratingChanges:
          type: array
          nullable: true
          description: >-
            Per-player rating change, present only once the match is rated. The NTRP bands
            (previousLevel/newLevel) are shown to everyone; the precise rates are populated
            only for RATER/ADMINISTRATOR viewers.
          items:
            $ref: '#/components/schemas/MatchPublicRatingChange'
        headToHead:
          allOf:
            - $ref: '#/components/schemas/MatchPublicHeadToHead'
          nullable: true
          description: >-
            Prior meetings between the same two players (#188); null when there are none or the
            match is not singles. Wins and set scores are oriented to team1/team2 of this match.
        event:
          allOf:
            - $ref: '#/components/schemas/MatchPublicEvent'
          nullable: true
          description: >-
            The event this match belongs to (#358), resolved to its shareable code + name so the
            public page can link to the event. Null/omitted for eventless (open-play) matches.

    MatchPublicEvent:
      type: object
      description: >-
        The event a match belongs to (#358), for a link from the public match page to the event's
        public page. Only the non-sensitive shareable code + display name are exposed.
      required:
        - publicCode
        - name
      properties:
        publicCode:
          type: string
        name:
          type: string

    MatchPublicHeadToHead:
      type: object
      description: Head-to-head record between a singles match's two players (#188).
      required:
        - team1Wins
        - team2Wins
        - meetings
      properties:
        team1Wins:
          type: integer
          description: Prior wins for team1's player (oriented to this match).
        team2Wins:
          type: integer
          description: Prior wins for team2's player (oriented to this match).
        meetings:
          type: array
          description: Prior completed meetings, newest first, excluding the match being viewed.
          items:
            $ref: '#/components/schemas/MatchPublicHeadToHeadEntry'

    MatchPublicHeadToHeadEntry:
      type: object
      description: One prior meeting in a head-to-head record (#188).
      required:
        - publicCode
        - matchDate
        - status
        - rated
        - matchFormat
        - sets
      properties:
        publicCode:
          type: string
        matchDate:
          type: string
          format: date
        status:
          type: string
        rated:
          type: boolean
        matchFormat:
          type: string
          description: SINGLES, DOUBLES, or MIXED_DOUBLES — whether the meeting was singles or doubles (#285).
        sets:
          type: array
          description: Set scores oriented to team1/team2 of the match being viewed.
          items:
            $ref: '#/components/schemas/MatchPublicSet'
        winnerPublicCode:
          type: string
          nullable: true
          description: The winning player's public code (one of the two), or null if undecided.

    MatchPublicRatingChange:
      type: object
      description: One player's rating change for a rated match (#136).
      properties:
        publicCode:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        previousLevel:
          type: string
          nullable: true
          description: Public NTRP band before the match (shown to everyone).
        newLevel:
          type: string
          nullable: true
          description: Public NTRP band after the match (shown to everyone).
        previousRating:
          type: string
          nullable: true
          description: Precise rate before the match (6 fractional digits); null unless viewer is RATER/ADMINISTRATOR.
        newRating:
          type: string
          nullable: true
          description: Precise rate after the match (6 fractional digits); null unless viewer is RATER/ADMINISTRATOR.
        ratingChange:
          type: string
          nullable: true
          description: Precise net change (6 fractional digits); null unless viewer is RATER/ADMINISTRATOR.
        confidence:
          type: string
          nullable: true
          description: The player's current rating confidence 0..1 (#343), shown as a %; 0 when not match-derived.

    CalculationRequest:
      type: object
      properties:
        dryRun:
          type: boolean
          default: true
          description: Defaults to true (preview only); set false to commit.

    PlayerChangeResponse:
      type: object
      required:
        - userId
        - previousRating
        - newRating
        - change
        - percentChange
        - levelChanged
        - breakdown
      properties:
        userId:
          type: string
          format: uuid
        previousRating:
          type: string
        newRating:
          type: string
        change:
          type: string
        percentChange:
          type: string
        previousLevel:
          type: string
          nullable: true
        newLevel:
          type: string
          nullable: true
        levelChanged:
          type: boolean
        breakdown:
          $ref: '#/components/schemas/CalculationBreakdownResponse'

    CalculationBreakdownResponse:
      type: object
      description: >-
        Internal calculator derivatives behind a player's change (issue #89); all values are precise decimal strings.
        The net fields are present for the v1 (averaged) calculator and null for v2, which reports per-set steps in `sets` (#110).
      properties:
        dominance:
          type: string
          nullable: true
          description: Average per-set game-margin dominance, -1.0..1.0. Null for the v2 per-set calculator.
        scale:
          type: string
          nullable: true
          description: Upset factor (underdog won) or competitive factor (otherwise). Null for the v2 per-set calculator.
        ratingGap:
          type: string
          nullable: true
        normalizedGap:
          type: string
          nullable: true
          description: ratingGap / NTRP range.
        competitiveThresholdPct:
          type: string
          nullable: true
          description: Competitive threshold as a fraction of the NTRP range (0.083 ≈ 0.5 points).
        isUpset:
          type: boolean
          nullable: true
        upsetMultiplier:
          type: string
          nullable: true
        kFactor:
          type: string
          nullable: true
        sets:
          type: array
          description: Per-set steps for the v2 calculator (#110); empty for v1.
          items:
            $ref: '#/components/schemas/SetBreakdownResponse'

    SetBreakdownResponse:
      type: object
      description: One set's calculator derivatives behind a player's change (v2 per-set calculator, issue #110).
      required:
        - setIndex
        - score
        - dominance
        - scale
        - ratingGap
        - normalizedGap
        - competitiveThresholdPct
        - isUpset
        - upsetMultiplier
        - kFactor
        - delta
        - ratingAfter
      properties:
        setIndex:
          type: integer
          description: 0-based set position within the match.
        score:
          type: string
          description: This player's set score as "self-opponent" games (e.g. "6-2").
        dominance:
          type: string
        scale:
          type: string
        ratingGap:
          type: string
        normalizedGap:
          type: string
        competitiveThresholdPct:
          type: string
        isUpset:
          type: boolean
        upsetMultiplier:
          type: string
        kFactor:
          type: string
        delta:
          type: string
          description: The rating change contributed by this set.
        ratingAfter:
          type: string
          description: The player's in-match rating after this set.

    MatchCalculationResponse:
      type: object
      required:
        - matchId
        - matchDate
        - changes
      properties:
        matchId:
          type: string
          format: uuid
        matchDate:
          type: string
          format: date
        changes:
          type: array
          items:
            $ref: '#/components/schemas/PlayerChangeResponse'

    CalculationResponse:
      type: object
      required:
        - dryRun
        - matchesProcessed
        - matches
      properties:
        dryRun:
          type: boolean
        matchesProcessed:
          type: integer
        matches:
          type: array
          items:
            $ref: '#/components/schemas/MatchCalculationResponse'

    MatchCalculationDetailResponse:
      type: object
      description: A rated match's result with its stored per-player calculation (issue #97).
      required:
        - match
        - changes
      properties:
        match:
          $ref: '#/components/schemas/MatchResponse'
        changes:
          type: array
          items:
            $ref: '#/components/schemas/MatchPlayerCalculationResponse'

    MatchPlayerCalculationResponse:
      type: object
      description: One player's stored calculation for a rated match, with their display name.
      required:
        - userId
        - previousRating
        - newRating
        - change
        - levelChanged
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          nullable: true
        previousRating:
          type: string
        newRating:
          type: string
        change:
          type: string
        percentChange:
          type: string
          nullable: true
        previousLevel:
          type: string
          nullable: true
        newLevel:
          type: string
          nullable: true
        levelChanged:
          type: boolean
        breakdown:
          description: Absent for initial assessments and rows committed before the breakdown was persisted.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CalculationBreakdownResponse'

    ThemeResponse:
      type: object
      required:
        - theme
      properties:
        theme:
          type: string
          enum: [AUTO, GRASS, CLAY, AO, US_OPEN, OFF_SEASON, CHRISTMAS, VALENTINES, SPRING, RAINY, HALLOWEEN, AUTUMN]
          description: The current global UI theme (#378); AUTO when unset.
        updatedAt:
          type: string
          nullable: true
          description: ISO timestamp of the last theme change; null when never set.
        updatedBy:
          type: string
          format: uuid
          nullable: true
          description: The administrator who last set the theme; null when never set.

    SetThemeRequest:
      type: object
      required:
        - theme
      properties:
        theme:
          type: string
          enum: [AUTO, GRASS, CLAY, AO, US_OPEN, OFF_SEASON, CHRISTMAS, VALENTINES, SPRING, RAINY, HALLOWEEN, AUTUMN]
          description: The UI theme to set (#378).

    StandingsSourceResponse:
      type: object
      required:
        - source
      properties:
        source:
          type: string
          enum: [RATING, POINTS]
          description: The snapshot source the Standings tab serves (#146); RATING when unset.
        updatedAt:
          type: string
          nullable: true
          description: ISO timestamp of the last source change; null when never set.
        updatedBy:
          type: string
          format: uuid
          nullable: true
          description: The administrator who last set the source; null when never set.

    SetStandingsSourceRequest:
      type: object
      required:
        - source
      properties:
        source:
          type: string
          enum: [RATING, POINTS]
          description: The standings serving source to set (#146).

    PointsPolicyResponse:
      type: object
      required:
        - eventType
        - minPoints
        - maxPoints
        - maxValidityDays
      properties:
        eventType:
          type: string
          enum: [OPEN_PLAY, LEAGUE, TOURNAMENT]
        minPoints:
          type: integer
          description: Minimum per-match reward for the type (#403 Phase B).
        maxPoints:
          type: integer
          description: Maximum per-match reward for the type (#403 Phase B).
        maxValidityDays:
          type: integer
          description: Max days an awarded point may stay valid for the type (#403 Phase B).

    SetPointsPolicyRequest:
      type: object
      required:
        - minPoints
        - maxPoints
        - maxValidityDays
      properties:
        minPoints:
          type: integer
        maxPoints:
          type: integer
        maxValidityDays:
          type: integer

    ClubBudgetResponse:
      type: object
      required:
        - clubId
        - eventType
        - budgeted
        - allocated
        - free
      properties:
        clubId:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [OPEN_PLAY, LEAGUE, TOURNAMENT]
        budgeted:
          type: integer
          description: The club's real budget allocation for the type (#403 Phase B).
        allocated:
          type: integer
          description: Points currently in use; 0 until reservations/awards land in Phase C/D (#403).
        free:
          type: integer
          description: Remaining allocable — budgeted minus allocated (#403 Phase B).

    SetClubBudgetRequest:
      type: object
      required:
        - budgetedPoints
      properties:
        budgetedPoints:
          type: integer
          description: The non-negative whole-number budget to set for the club and type (#403 Phase B).

    CreateClubRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The club name (non-blank; trimmed server-side).

    UpdateClubRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The new club name (non-blank; trimmed server-side).

    AssignOwnerRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
          description: The existing user to record as an owner of the club.

    ClubResponse:
      type: object
      required:
        - id
        - name
        - publicCode
        - isActive
        - owners
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        publicCode:
          type: string
          description: The shareable code for the club's public-by-code page (#327).
        isActive:
          type: boolean
        owners:
          type: array
          items:
            type: object
            required:
              - userId
              - publicCode
            properties:
              userId:
                type: string
                format: uuid
              displayName:
                type: string
                nullable: true
              publicCode:
                type: string

    ClubPublicResponse:
      type: object
      description: >-
        Read-only public summary of a club (#327) — its name plus the events it organizes, split into
        upcoming and past. No owner or roster PII is exposed.
      required:
        - publicCode
        - name
        - upcoming
        - past
      properties:
        publicCode:
          type: string
        name:
          type: string
        isActive:
          type: boolean
          description: False once the club is soft-deleted (#325); the public page flags it as deleted.
        upcoming:
          type: array
          items:
            $ref: '#/components/schemas/ClubPublicEventResponse'
        past:
          type: array
          items:
            $ref: '#/components/schemas/ClubPublicEventResponse'

    ClubPublicEventResponse:
      type: object
      description: >-
        One of a club's events on its public page (#327) — code, name, date range, plus the public
        per-event points (#403 Phase E). eventType, and both designatedPoints (planned) and
        awardedPoints (finalized); the UI shows awarded once the event is finalized, else designated.
        Club utilization is NOT here — it is served only by the gated points-summary.
      required:
        - publicCode
        - name
        - startDate
        - endDate
        - eventType
        - designatedPoints
        - awardedPoints
      properties:
        publicCode:
          type: string
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        eventType:
          type: string
          enum: [OPEN_PLAY, LEAGUE, TOURNAMENT]
        designatedPoints:
          type: integer
          description: The event's planned (designated) points total, times team size (#403 Phase E).
        awardedPoints:
          type: integer
          description: The event's awarded points total from active in-window awards (#403 Phase E).

    ClubEventPointsResponse:
      type: object
      description: One event's points figures in the club points summary (#403 Phase E).
      required:
        - eventPublicCode
        - name
        - eventType
        - finalized
        - designated
        - awarded
      properties:
        eventPublicCode:
          type: string
        name:
          type: string
        eventType:
          type: string
          enum: [OPEN_PLAY, LEAGUE, TOURNAMENT]
        finalized:
          type: boolean
        designated:
          type: integer
        awarded:
          type: integer

    ClubPointsSummaryResponse:
      type: object
      description: >-
        A club's points summary for its owner (#403 Phase E) — per-type utilization plus a per-event
        breakdown. CLUB_OWNER / points-manager only; never exposed anonymously.
      required:
        - clubId
        - utilization
        - events
      properties:
        clubId:
          type: string
          format: uuid
        utilization:
          type: array
          items:
            $ref: '#/components/schemas/ClubBudgetResponse'
        events:
          type: array
          items:
            $ref: '#/components/schemas/ClubEventPointsResponse'

    CreateInviteRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          description: The email to invite (normalized to lowercase server-side).

    InviteResponse:
      type: object
      required:
        - id
        - email
        - status
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        status:
          type: string
          enum: [PENDING, ACCEPTED, REVOKED, EXPIRED]
          description: EXPIRED is derived from expiresAt, not stored.
        invitedBy:
          type: string
          format: uuid
          nullable: true
        expiresAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    InvitePageResponse:
      type: object
      description: A page of invites plus the total count of all invites.
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InviteResponse'
        total:
          type: integer

    FlagCandidateRequest:
      type: object
      description: Manually flag a suspected duplicate pair (#126).
      required:
        - userAId
        - userBId
      properties:
        userAId:
          type: string
          format: uuid
        userBId:
          type: string
          format: uuid
        reason:
          type: string
          nullable: true

    ConfirmCandidateRequest:
      type: object
      description: Which account is the canonical ("true") one when confirming a candidate (#126).
      required:
        - canonicalId
      properties:
        canonicalId:
          type: string
          format: uuid

    DuplicateCandidateResponse:
      type: object
      description: A suspected duplicate pair for admin review (#126).
      required:
        - id
        - status
        - signal
        - flaggedAt
        - userA
        - userB
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [OPEN, DISMISSED, RESOLVED]
        signal:
          type: string
          enum: [DUPLICATE_PHONE, MANUAL]
        detail:
          type: string
          nullable: true
        flaggedAt:
          type: string
        userA:
          $ref: '#/components/schemas/UserSummaryResponse'
        userB:
          $ref: '#/components/schemas/UserSummaryResponse'

    DuplicateCandidatePageResponse:
      type: object
      description: A page of duplicate candidates plus the total matching the filter.
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DuplicateCandidateResponse'
        total:
          type: integer

    AuditCommentRequest:
      type: object
      description: Set or clear an admin note on an audit entry (a blank/absent value clears it).
      properties:
        comment:
          type: string
          nullable: true

    AuditPersonResponse:
      type: object
      description: A user resolved to a display name + player code (or just the id if unresolved).
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          nullable: true
        publicCode:
          type: string
          nullable: true

    AuditMatchResponse:
      type: object
      description: A match-typed target resolved to its public code + date, linking to the public match page (#136).
      required:
        - matchId
        - publicCode
        - matchDate
      properties:
        matchId:
          type: string
          format: uuid
        publicCode:
          type: string
        matchDate:
          type: string
          format: date

    AuditEntryResponse:
      type: object
      required:
        - id
        - occurredAt
        - category
        - action
        - entityType
        - summary
      properties:
        id:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
          description: ISO-8601 UTC instant; the client renders it in the viewer's timezone.
        category:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
          format: uuid
          nullable: true
        summary:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
            nullable: true
        comment:
          type: string
          nullable: true
        actor:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AuditPersonResponse'
        target:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AuditPersonResponse'
        matchTarget:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AuditMatchResponse'

    AuditLogResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntryResponse'
        total:
          type: integer

    BandHopUserRow:
      type: object
      required:
        - publicCode
        - fromBand
        - toBand
      properties:
        publicCode:
          type: string
        displayName:
          type: string
          nullable: true
        fromBand:
          type: string
          description: NTRP band entering the window (label only), e.g. "3.0".
        toBand:
          type: string
          description: NTRP band at the window close (label only).

    BandHopBucket:
      type: object
      required:
        - hopDistance
        - count
        - users
      properties:
        hopDistance:
          type: integer
          description: Absolute number of 0.5-wide bands moved (0 = stayed in band).
        count:
          type: integer
        users:
          type: array
          items:
            $ref: '#/components/schemas/BandHopUserRow'

    BandHopReportResponse:
      type: object
      required:
        - startDate
        - endDate
        - totalPlayers
        - stayedCount
        - jumpedCount
        - buckets
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        totalPlayers:
          type: integer
        stayedCount:
          type: integer
          description: Players whose band did not change over the window (hopDistance 0).
        jumpedCount:
          type: integer
          description: Players who moved at least one band (hopDistance >= 1).
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/BandHopBucket'

    CreatePlayerListRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    AddMemberRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid

    PlayerListSummaryResponse:
      type: object
      required:
        - id
        - name
        - createdAt
        - memberCount
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
        memberCount:
          type: integer

    PlayerListResponse:
      type: object
      required:
        - id
        - name
        - createdAt
        - members
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/UserSummaryResponse'

    SeedingEntryResponse:
      type: object
      required:
        - position
        - publicCode
        - rating
      properties:
        seed:
          type: integer
          nullable: true
        position:
          type: integer
        userId:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        publicCode:
          type: string
        ntrpBand:
          type: string
          nullable: true
        rating:
          type: string
        sex:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true

    SeedingResponse:
      type: object
      required:
        - generatedAt
        - entries
      properties:
        generatedAt:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/SeedingEntryResponse'

    StandingEntryResponse:
      type: object
      required:
        - rank
        - userId
        - publicCode
      properties:
        rank:
          type: integer
        userId:
          type: string
        displayName:
          type: string
          nullable: true
        publicCode:
          type: string
        sex:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
        currentRating:
          type: string
          nullable: true
          description: >-
            Precise NTRP rating (6 fractional digits); present only for RATER/ADMINISTRATOR viewers
            (#186), null for everyone else.

    StandingsGroupResponse:
      type: object
      description: A selectable (band, sex) group present in the current snapshot (#220).
      required:
        - band
        - label
      properties:
        band:
          type: string
          description: The band code (e.g. "4.0") to pass as the `band` query parameter.
        label:
          type: string
          description: The human-readable band header (e.g. "NTRP 4.0 Band Race").
        sex:
          type: string
          nullable: true
          description: The group's sex ("Male"/"Female"), or null for the Unspecified group.

    StandingsBandResponse:
      type: object
      description: One NTRP band selector (#113), listed whether or not it currently has ranked players.
      required:
        - code
        - label
      properties:
        code:
          type: string
          description: The band code (e.g. "4.0") to pass as the `band` query parameter.
        label:
          type: string
          description: The human-readable band header (e.g. "NTRP 4.0 Band Race").

    StandingsPageResponse:
      type: object
      description: >-
        One page of a (band, sex) leaderboard from the latest published snapshot (#220), plus the
        group's total, the (band, sex) selectors with data, and every NTRP band for the dropdown.
        Ranks restart at 1 within each group.
      required:
        - limit
        - offset
        - total
        - entries
        - groups
        - bands
        - source
      properties:
        band:
          type: string
          nullable: true
          description: The band code served (null only for an empty snapshot).
        label:
          type: string
          nullable: true
          description: The served band's human-readable header.
        sex:
          type: string
          nullable: true
          description: The group's sex ("Male"/"Female"), or null for the Unspecified group.
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
          description: The full size of the (band, sex) group (for pagination).
        entries:
          type: array
          items:
            $ref: '#/components/schemas/StandingEntryResponse'
        groups:
          type: array
          description: The (band, sex) selectors that actually have ranked players in this snapshot.
          items:
            $ref: '#/components/schemas/StandingsGroupResponse'
        bands:
          type: array
          description: Every NTRP band (strongest-first) for the dropdown, including bands with no data.
          items:
            $ref: '#/components/schemas/StandingsBandResponse'
        source:
          type: string
          enum:
            - RATING
            - POINTS
          description: >-
            The effective serving source. RATING is computed live from current ratings; POINTS is served
            from the latest published points snapshot. When source is POINTS and no snapshot exists the
            entries are empty (an explicit points empty state), never a silent fallback to ratings.

    StandingsLocateResponse:
      type: object
      description: The caller's location in the current standings plus the containing page offset (#220).
      required:
        - band
        - label
        - rank
        - limit
        - offset
      properties:
        band:
          type: string
        label:
          type: string
        sex:
          type: string
          nullable: true
        rank:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    StandingsCalculationRequest:
      type: object
      description: >-
        Body for the points-based standings recompute (#146 phase 2). dryRun defaults to true (preview
        only); set it explicitly to false to publish a POINTS snapshot.
      properties:
        dryRun:
          type: boolean
          default: true

    StandingsCalculationEntryResponse:
      type: object
      description: One ranked player in a recomputed (band, sex) group — points total + tie-break rating (#146).
      required:
        - rank
        - userId
        - publicCode
        - points
      properties:
        rank:
          type: integer
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          nullable: true
        publicCode:
          type: string
        points:
          type: string
          description: The player's summed counting points for this (band, sex) as a decimal string.
        currentRating:
          type: string
          nullable: true
          description: The player's current rating (the D8 tie-break input); null when unrated.

    StandingsCalculationGroupResponse:
      type: object
      description: One recomputed (band, sex) race, ranked by points descending (#146).
      required:
        - band
        - entries
      properties:
        band:
          type: string
        sex:
          type: string
          nullable: true
        entries:
          type: array
          items:
            $ref: '#/components/schemas/StandingsCalculationEntryResponse'

    StandingsCalculationResponse:
      type: object
      description: The points-based recompute outcome (#146) — whether it was a dry run, plus the ranked groups.
      required:
        - dryRun
        - groupsComputed
        - groups
      properties:
        dryRun:
          type: boolean
        groupsComputed:
          type: integer
        groups:
          type: array
          items:
            $ref: '#/components/schemas/StandingsCalculationGroupResponse'

    GrantRankingPointsRequest:
      type: object
      description: Body for granting a ranking-point award (#146). points is a decimal string.
      required:
        - points
        - pointClass
      properties:
        points:
          type: string
          description: The award amount as a decimal string (must be > 0).
        pointClass:
          type: string
          enum:
            - ANNUAL_TOURNAMENT
            - SEASONAL_TOURNAMENT_1M
            - SEASONAL_TOURNAMENT_3M
            - SEASONAL_TOURNAMENT_6M
            - OPEN_PLAY
            - EXTERNAL
        sourceType:
          type: string
          enum:
            - INTERNAL
            - EXTERNAL
          default: INTERNAL
        sourceId:
          type: string
          nullable: true
          description: Provenance reference (a system id or a free-text external ref).
        band:
          type: string
          nullable: true
          description: Optional NTRP band override; defaults to the target's current band.
        reason:
          type: string
          nullable: true
          description: Human-readable justification; required for an EXTERNAL / ad-hoc grant.
        validFrom:
          type: string
          format: date-time
          nullable: true
          description: Optional start of the validity window; defaults to now.
        validUntil:
          type: string
          format: date-time
          nullable: true
          description: Optional end of the validity window; defaults from the point-class policy.

    RevokeRankingPointsRequest:
      type: object
      description: Body for revoking a ranking-point award (#146) — an optional reason.
      properties:
        reason:
          type: string
          nullable: true

    RankingPointAwardResponse:
      type: object
      description: One ranking-points ledger row (#146). Points and timestamps are strings.
      required:
        - id
        - userId
        - points
        - pointClass
        - sourceType
        - band
        - sex
        - validFrom
        - validUntil
        - status
        - awardedAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        points:
          type: string
        pointClass:
          type: string
        sourceType:
          type: string
        sourceId:
          type: string
          nullable: true
        band:
          type: string
        sex:
          type: string
        reason:
          type: string
          nullable: true
        validFrom:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - ACTIVE
            - REVOKED
        revokesAwardId:
          type: string
          format: uuid
          nullable: true
        grantedBy:
          type: string
          format: uuid
          nullable: true
        awardedAt:
          type: string
          format: date-time
        eventId:
          type: string
          format: uuid
          nullable: true
          description: Event that produced this award on finalize (#403 Phase D); null for manual or external grants.
