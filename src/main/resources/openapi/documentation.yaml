openapi: 3.0.0
info:
  title: Skopeo API
  version: 1.0.0
  description: Performance-based tennis ranking calculation API supporting NTRP and UTR rating systems

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Rankings
    description: Rating calculation endpoints
  - name: Users
    description: User management — provisioning and profile CRUD (Firebase-authenticated)
  - name: Contacts
    description: Email/phone management; verification is an ADMINISTRATOR action
  - name: Names
    description: Append-only user names; the display name is a DISPLAY-typed name
  - name: Capabilities
    description: User roles (admin-only); append-only grants with audit
  - name: Ratings
    description: Player ratings & assessment; initial ratings are administrator-set
  - name: Matches
    description: Match fixtures & results (append-only); ratings calculated separately

paths:
  /api/v1/calculate-ranking:
    post:
      summary: Calculate ranking changes
      description: |
        Calculates rating changes for players based on match results.
        Supports both NTRP (National Tennis Rating Program) and UTR (Universal Tennis Rating) systems.

        The algorithm uses a performance-based Elo calculation that considers:
        - Current player ratings and rating difference
        - Match score and game margins
        - Dominance factor (games won ratio)
        - Expected vs actual performance

        Returns updated ratings with published levels and percentage changes.
      tags:
        - Rankings
      requestBody:
        required: true
        description: Match details and player ratings
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RankingCalculationRequest'
            example:
              teams:
                T1:
                  teamId: "T1"
                  name: "Player 1"
                  players:
                    - playerId: "P1"
                      name: "Player 1"
                      rating:
                        value: "4.5"
                        system: "NTRP"
                  teamType: "SINGLES"
                T2:
                  teamId: "T2"
                  name: "Player 2"
                  players:
                    - playerId: "P2"
                      name: "Player 2"
                      rating:
                        value: "4.0"
                        system: "NTRP"
                  teamType: "SINGLES"
              matchScore:
                sets:
                  - games:
                      T1: 6
                      T2: 2
                    winnerTeamId: "T1"
      responses:
        '200':
          description: Successfully calculated rating changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingCalculationResponse'
        '400':
          description: Invalid request (validation error or malformed JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users:
    get:
      summary: Look up users by name or id (HOST/ADMINISTRATOR only)
      description: |
        Two mutually-exclusive lookups (provide exactly one):
          - `name` — case-insensitive, partial match on any of a user's names
            (the staff player-picker and admin role-grants).
          - `ids` — comma-separated UUIDs to resolve known ids to display names
            (match rosters, rating history, calculation previews).
        Returns a slim summary (no contacts/identities). Name results are capped server-side.
      tags:
        - Users
      security:
        - firebaseAuth: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Name fragment to search for (mutually exclusive with `ids`).
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated user UUIDs to resolve (mutually exclusive with `name`).
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummaryResponse'
        '400':
          description: Neither or both of name/ids given, blank name, or a malformed id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is not HOST or ADMINISTRATOR
    post:
      summary: Provision the authenticated user
      description: |
        The single final step of every sign-up flow (Google, Facebook, manual).
        Identity (firebase uid, email, sign-in provider, photo) is taken from the
        verified Firebase token — never the request body. Idempotent: re-posting with
        an already-known uid returns the existing user with 200 instead of 201.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '200':
          description: User already existed (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid Firebase token

  /api/v1/users/me:
    get:
      summary: Get the authenticated user's own profile
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The caller's profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid Firebase token
        '404':
          description: Caller has not been provisioned yet (POST /api/v1/users first)

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a user by id
      description: Permitted only for the user themselves or an ADMINISTRATOR.
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The requested user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Malformed id
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is neither the target user nor an ADMINISTRATOR
        '404':
          description: No such user
    patch:
      summary: Partially update a user's profile
      description: Omitted (null) fields are left unchanged. Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such user
    put:
      summary: Replace a user's mutable profile fields
      description: Replaces photoUrl/dateOfBirth/sex/city wholesale — omitted fields are cleared. Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such user
    delete:
      summary: Deactivate (soft-delete) a user
      description: Sets is_active to false. Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: User deactivated
        '403':
          description: Forbidden
        '404':
          description: No such user

  /api/v1/users/{userId}/contacts:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List a user's contacts
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user
    post:
      summary: Add an email or phone
      description: |
        Created as MANUAL/PENDING and active. Self-or-ADMINISTRATOR. Values are immutable;
        to change a contact, disable the current one (via /state) and add a new one.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreateRequest'
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body
        '403':
          description: Forbidden
        '404':
          description: No such user
        '409':
          description: An active contact of that type already exists for the user

  /api/v1/users/{userId}/contacts/{id}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a contact
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '403':
          description: Forbidden
        '404':
          description: No such contact

  /api/v1/users/{userId}/contacts/{id}/state:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Enable or disable a contact
      description: |
        Contact values are immutable — instead of editing, disable a contact and add a new
        one. Self-or-ADMINISTRATOR. Re-enabling a contact while another of the same type is
        already active is a conflict.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactStateRequest'
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such contact
        '409':
          description: Another active contact of that type already exists

  /api/v1/users/{userId}/contacts/{id}/verification:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Set a contact's verification state (ADMINISTRATOR only)
      description: |
        Manual stand-in for automated OTP. Only an ADMINISTRATOR may call this. A VERIFIED
        status stamps verifiedAt/verifiedBy and the method (default ADMIN_OVERRIDE); any
        other status clears those audit fields.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such contact
        '409':
          description: This value is already verified for another account

  /api/v1/users/{userId}/names:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List a user's names
      tags:
        - Names
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's names (incl. disabled history)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NameResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user
    post:
      summary: Add a name
      description: |
        Append-only. Self-or-ADMINISTRATOR. Multiple names of the same type are allowed.
        A DISPLAY name replaces the user's current display name (the old one becomes disabled
        history). Values are immutable; to change other names, disable (via /state) and add a
        new one.
      tags:
        - Names
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameCreateRequest'
      responses:
        '201':
          description: Name created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameResponse'
        '400':
          description: Invalid body
        '403':
          description: Forbidden
        '404':
          description: No such user

  /api/v1/users/{userId}/names/{id}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a name
      tags:
        - Names
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameResponse'
        '403':
          description: Forbidden
        '404':
          description: No such name

  /api/v1/users/{userId}/names/{id}/state:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Enable or disable a name
      description: |
        Name values are immutable — instead of editing, disable a name and add a new one.
        Self-or-ADMINISTRATOR. The display name cannot be disabled (replace it by posting a
        new DISPLAY name); re-enabling a former display name conflicts with the current one.
      tags:
        - Names
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameStateRequest'
      responses:
        '200':
          description: Updated name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameResponse'
        '400':
          description: Invalid body, malformed id, or attempting to disable the display name
        '403':
          description: Forbidden
        '404':
          description: No such name
        '409':
          description: Re-enabling a former display name conflicts with the current one

  /api/v1/users/{userId}/capabilities:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List a user's capabilities (ADMINISTRATOR only)
      description: Includes revoked history. The whole capability API is admin-only.
      tags:
        - Capabilities
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's capability grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CapabilityResponse'
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user
    post:
      summary: Grant a capability (ADMINISTRATOR only)
      description: Idempotent — 201 when newly granted, 200 if already held. Records granted_by.
      tags:
        - Capabilities
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityGrantRequest'
      responses:
        '201':
          description: Capability granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '200':
          description: Capability already held (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '400':
          description: Invalid capability
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user

  /api/v1/users/{userId}/capabilities/{capability}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: capability
        in: path
        required: true
        schema:
          type: string
          enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR]
    delete:
      summary: Revoke a capability (ADMINISTRATOR only)
      description: |
        Disables the active grant (kept as history). Guardrails: PLAYER cannot be revoked; the
        last ADMINISTRATOR cannot be revoked; an admin cannot revoke their own ADMINISTRATOR
        while others remain.
      tags:
        - Capabilities
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: Capability revoked
        '403':
          description: Caller is not an ADMINISTRATOR, or revoking own ADMINISTRATOR
        '404':
          description: No such user, or the capability is not currently held
        '409':
          description: Revoking PLAYER or the last ADMINISTRATOR

  /api/v1/ratings/calculations:
    post:
      summary: Trigger the rating calculation (ADMINISTRATOR only)
      description: |
        Processes matches pending calculation oldest→newest, carrying ratings forward. dryRun
        defaults to true (an empty body is a dry run) and previews with no writes; an explicit
        false commits ratings, history, and rated_at.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculationRequest'
      responses:
        '200':
          description: The calculation outcome (preview or committed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationResponse'
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/users/pending-assessment:
    get:
      summary: List users pending an initial rating (ADMINISTRATOR only)
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: Active users with no rating on record
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PendingAssessmentResponse'
        '403':
          description: Caller is not an ADMINISTRATOR

  /api/v1/users/{userId}/ratings:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a user's current ratings
      description: Self-or-ADMINISTRATOR. Returns the user's NTRP/UTR ratings.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRatingResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user

  /api/v1/users/{userId}/ratings/{system}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: system
        in: path
        required: true
        schema:
          type: string
          enum: [NTRP, UTR]
    put:
      summary: Set or adjust a user's rating (ADMINISTRATOR only)
      description: |
        The initial assessment, or a later adjustment. Validates the system range
        (NTRP 1.0–7.0, UTR 1.0–16.0) and derives the published level.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRatingRequest'
      responses:
        '200':
          description: The updated rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRatingResponse'
        '400':
          description: Invalid rating value/confidence or unknown system
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such user

  /api/v1/users/{userId}/rating-history:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: system
        in: query
        required: false
        schema:
          type: string
          enum: [NTRP, UTR]
    get:
      summary: Get a user's rating history
      description: Self-or-ADMINISTRATOR. Optionally filter by system.
      tags:
        - Ratings
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: Rating-change history (most recent first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RatingHistoryResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user

  /api/v1/matches:
    get:
      summary: List match fixtures by oversight view (HOST/ADMINISTRATOR)
      description: |
        An ADMINISTRATOR sees every match in the view; a HOST sees only the fixtures
        they created (so they can find their own matches awaiting results).
      tags:
        - Matches
      security:
        - firebaseAuth: []
      parameters:
        - name: filter
          in: query
          required: true
          schema:
            type: string
            enum: [pending-calculation, awaiting-results]
          description: pending-calculation = completed & unrated; awaiting-results = scheduled & overdue.
      responses:
        '200':
          description: Matching fixtures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MatchResponse'
        '400':
          description: Missing or invalid filter
        '403':
          description: Caller is not an ADMINISTRATOR
    post:
      summary: Create a match fixture (HOST/ADMINISTRATOR)
      description: Scheduled fixture, no results. Every participant must already be rated in the system.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFixtureRequest'
      responses:
        '201':
          description: Fixture created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '400':
          description: Invalid input (bad ids/date/system, unrated participant, bad composition)
        '403':
          description: Caller is not HOST/ADMINISTRATOR

  /api/v1/matches/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a match
      description: Limited to a participant or HOST/ADMINISTRATOR.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '403':
          description: Forbidden
        '404':
          description: No such match

  /api/v1/matches/{id}/result:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Upload match results (HOST/ADMINISTRATOR)
      description: |
        Records the set scores, derives the winner, and marks the match COMPLETED (pending
        calculation). Ratings are NOT computed here.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchResultRequest'
      responses:
        '200':
          description: Completed match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '400':
          description: Invalid scores or no clear winner
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such match
        '409':
          description: Results already uploaded, or the match is disabled

  /api/v1/matches/{id}/state:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Enable or disable a match (HOST/ADMINISTRATOR)
      description: |
        Append-only corrections: disable the original and add a new match. Disabling is allowed
        only while the match is unrated.
      tags:
        - Matches
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchStateRequest'
      responses:
        '200':
          description: Updated match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResponse'
        '403':
          description: Caller is not HOST/ADMINISTRATOR
        '404':
          description: No such match
        '409':
          description: Cannot disable a match that has already been rated

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase-issued ID token (RS256), verified against Google's public keys.
  schemas:
    RankingCalculationRequest:
      type: object
      required:
        - teams
        - matchScore
      properties:
        teams:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Team'
          description: Map of team IDs to Team objects (exactly 2 teams required)
        matchScore:
          $ref: '#/components/schemas/MatchScore'
        options:
          $ref: '#/components/schemas/RatingCalculationOptions'

    RankingCalculationResponse:
      type: object
      required:
        - ratingChanges
        - players
        - teams
      properties:
        ratingChanges:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RatingChange'
          description: Map of player IDs to rating changes
        players:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PlayerProfile'
          description: Map of player IDs to updated player profiles
        teams:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Team'
          description: Map of team IDs to updated teams with updated players

    PlayerProfile:
      type: object
      required:
        - playerId
        - name
        - rating
      properties:
        playerId:
          type: string
        name:
          type: string
        rating:
          $ref: '#/components/schemas/Rating'

    Team:
      type: object
      required:
        - teamId
        - name
        - players
      properties:
        teamId:
          type: string
          minLength: 1
          maxLength: 50
          description: Unique identifier for this team in the match context
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Team name (for singles - player name, for doubles - "Player1/Player2")
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerProfile'
          minItems: 1
          maxItems: 2
          description: List of players in this team (1 for singles, 2 for doubles)
        teamType:
          $ref: '#/components/schemas/TeamType'
          default: SINGLES
          description: Type of team (SINGLES, DOUBLES, or MIXED_DOUBLES)

    TeamType:
      type: string
      enum:
        - SINGLES
        - DOUBLES
        - MIXED_DOUBLES
      description: |
        Team type:
        - SINGLES: 1 player per team
        - DOUBLES: 2 players per team
        - MIXED_DOUBLES: 2 players per team (male + female)

    Rating:
      type: object
      required:
        - value
        - system
      properties:
        value:
          type: string
          description: The numeric rating value (e.g., "4.5", "10.123456")
        system:
          $ref: '#/components/schemas/RatingSystem'
        publishedLevel:
          $ref: '#/components/schemas/Level'
          description: The published level (optional in request, always present in response)

    Level:
      type: object
      required:
        - value
        - minRating
        - maxRating
        - system
      properties:
        value:
          type: string
          description: The published level value (e.g., "4.5" for NTRP, "10.0" for UTR)
        minRating:
          type: string
          description: Minimum rating for this level (inclusive)
        maxRating:
          type: string
          description: Maximum rating for this level (exclusive)
        system:
          $ref: '#/components/schemas/RatingSystem'

    RatingSystem:
      type: string
      enum:
        - NTRP
        - UTR
      description: |
        Rating system:
        - NTRP: National Tennis Rating Program (1.0 - 7.0 range)
        - UTR: Universal Tennis Rating (1.0 - 16.0 range)

    MatchScore:
      type: object
      required:
        - sets
      properties:
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SetScore'
        winnerTeamId:
          type: string
          description: Team ID of the match winner. Defaults to the team that won the most sets when omitted.
        loserTeamId:
          type: string
          description: Team ID of the match loser. Defaults to the team that lost the most sets when omitted; must differ from the winner and be one of the teams.
        matchFormat:
          type: string
          enum: [BEST_OF_THREE, BEST_OF_FIVE, SINGLE_SET, ADVANTAGE_SET]
          default: BEST_OF_THREE

    SetScore:
      type: object
      required:
        - games
      properties:
        games:
          type: object
          additionalProperties:
            type: integer
        winnerTeamId:
          type: string
          description: Team ID of the set winner. Defaults to the team with the most games when omitted.
        loserTeamId:
          type: string
          description: Team ID of the set loser. Defaults to the team with the fewest games when omitted; must differ from the winner.
        tiebreak:
          $ref: '#/components/schemas/TiebreakScore'

    TiebreakScore:
      type: object
      required:
        - points
      description: |
        Informational only: documents how many points the tiebreak was (e.g. 7-5).
        The tiebreak is part of the set score, so its winner must be the set winner.
        Tiebreak points are not included in the dominance calculation of the match —
        only games count.
      properties:
        points:
          type: object
          additionalProperties:
            type: integer
        winnerTeamId:
          type: string
          description: Team ID of the tiebreak winner. Defaults to the team with the most points when omitted.
        loserTeamId:
          type: string
          description: Team ID of the tiebreak loser. Defaults to the team with the fewest points when omitted; must differ from the winner.

    RatingCalculationOptions:
      type: object
      properties:
        smoothingEnabled:
          type: boolean
          default: false
        smoothingFactor:
          type: number
          format: double
          default: 0.5

    RatingChange:
      type: object
      required:
        - change
        - previousRating
        - newRating
        - percentChange
        - levelChanged
      properties:
        change:
          type: string
          description: The absolute rating change (e.g., "+0.123456" or "-0.045678")
        previousRating:
          $ref: '#/components/schemas/Rating'
          description: The player's rating before the match
        newRating:
          $ref: '#/components/schemas/Rating'
          description: The player's rating after the match (includes updated publishedLevel)
        percentChange:
          type: string
          description: The percentage change in rating (e.g., "+2.75%")
        levelChanged:
          type: boolean
          description: Whether the player's published level changed (e.g., 4.0 → 4.5)

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    NameDto:
      type: object
      required:
        - id
        - type
        - value
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [FIRST, MIDDLE, LAST, SUFFIX, NICKNAME, PREFERRED, FULL, GOVERNMENT, DISPLAY]
        value:
          type: string
        isActive:
          type: boolean
          default: true

    ContactDto:
      type: object
      required:
        - id
        - type
        - value
        - source
        - status
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        source:
          type: string
          enum: [GOOGLE, FACEBOOK, MANUAL]
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]
        isPrimary:
          type: boolean
        isActive:
          type: boolean

    IdentityDto:
      type: object
      required:
        - provider
        - providerUid
      properties:
        provider:
          type: string
          enum: [GOOGLE, FACEBOOK, PASSWORD]
        providerUid:
          type: string
        isPrimary:
          type: boolean

    CreateUserRequest:
      type: object
      description: |
        Profile details the client supplies. Identity and email come from the verified
        token and are ignored if present here. displayName is the single name shown in the
        UI; if omitted, the token's name (Google/Facebook) is used. Structured names
        (FIRST/LAST/nicknames) are added later via the names API.
      properties:
        displayName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
          description: ISO-8601 (yyyy-MM-dd)
        sex:
          type: string
          nullable: true
          enum: [Male, Female]
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-2 (defaults to PH)

    ProfileRequest:
      type: object
      description: |
        Mutable profile fields. PATCH leaves omitted (null) fields unchanged;
        PUT replaces all of them (omitted fields are cleared).
      properties:
        photoUrl:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
          enum: [Male, Female]
        city:
          type: string
          nullable: true

    UserSummaryResponse:
      type: object
      description: Slim user shape for search results (player picker, role grants).
      required:
        - id
        - capabilities
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          nullable: true
        capabilities:
          type: array
          items:
            type: string
            enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR]

    UserResponse:
      type: object
      required:
        - id
        - country
        - kycVerified
        - isActive
        - names
        - contacts
        - identities
        - capabilities
      properties:
        id:
          type: string
          format: uuid
        firebaseUid:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
        kycVerified:
          type: boolean
        isActive:
          type: boolean
        names:
          type: array
          items:
            $ref: '#/components/schemas/NameDto'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactDto'
        identities:
          type: array
          items:
            $ref: '#/components/schemas/IdentityDto'
        capabilities:
          type: array
          items:
            type: string
            enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR]

    ContactCreateRequest:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        isPrimary:
          type: boolean
          default: true

    ContactStateRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean

    VerificationRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          description: Defaults to ADMIN_OVERRIDE when status is VERIFIED.
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]

    ContactResponse:
      type: object
      required:
        - id
        - userId
        - type
        - value
        - source
        - status
        - isPrimary
        - isActive
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        source:
          type: string
          enum: [GOOGLE, FACEBOOK, MANUAL]
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]
        isPrimary:
          type: boolean
        isActive:
          type: boolean
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        verifiedBy:
          type: string
          format: uuid
          nullable: true
        disabledAt:
          type: string
          format: date-time
          nullable: true

    NameCreateRequest:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          description: A DISPLAY name replaces the user's current display name.
          enum: [FIRST, MIDDLE, LAST, SUFFIX, NICKNAME, PREFERRED, FULL, GOVERNMENT, DISPLAY]
        value:
          type: string

    NameStateRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean

    NameResponse:
      type: object
      required:
        - id
        - userId
        - type
        - value
        - isActive
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: [FIRST, MIDDLE, LAST, SUFFIX, NICKNAME, PREFERRED, FULL, GOVERNMENT, DISPLAY]
        value:
          type: string
        isActive:
          type: boolean
        disabledAt:
          type: string
          format: date-time
          nullable: true

    CapabilityGrantRequest:
      type: object
      required:
        - capability
      properties:
        capability:
          type: string
          enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR]

    CapabilityResponse:
      type: object
      required:
        - capability
        - isActive
      properties:
        capability:
          type: string
          enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR]
        isActive:
          type: boolean
        grantedBy:
          type: string
          format: uuid
          nullable: true
        grantedAt:
          type: string
          format: date-time
          nullable: true
        revokedBy:
          type: string
          format: uuid
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true

    SetRatingRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          description: Rating value (NTRP 1.0–7.0, UTR 1.0–16.0).
        confidence:
          type: string
          nullable: true
          description: 0–1; defaults to 0.50.

    UserRatingResponse:
      type: object
      required:
        - system
        - value
        - confidence
        - matchesPlayed
      properties:
        system:
          type: string
          enum: [NTRP, UTR]
        value:
          type: string
        level:
          type: string
          nullable: true
        confidence:
          type: string
        matchesPlayed:
          type: integer
        lastMatchDate:
          type: string
          format: date
          nullable: true

    RatingHistoryResponse:
      type: object
      required:
        - id
        - system
        - previousRating
        - newRating
        - ratingChange
        - levelChanged
        - smoothingApplied
        - calculatedAt
      properties:
        id:
          type: string
          format: uuid
        matchId:
          type: string
          format: uuid
          nullable: true
        system:
          type: string
          enum: [NTRP, UTR]
        previousRating:
          type: string
        newRating:
          type: string
        ratingChange:
          type: string
        percentChange:
          type: string
          nullable: true
        previousLevel:
          type: string
          nullable: true
        newLevel:
          type: string
          nullable: true
        levelChanged:
          type: boolean
        dominanceFactor:
          type: string
          nullable: true
        smoothingApplied:
          type: boolean
        smoothingFactor:
          type: string
          nullable: true
        calculatedAt:
          type: string
          format: date-time

    PendingAssessmentResponse:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          nullable: true

    CreateFixtureRequest:
      type: object
      required:
        - ratingSystem
        - matchType
        - matchFormat
        - matchDate
        - team1
        - team2
      properties:
        ratingSystem:
          type: string
          enum: [NTRP, UTR]
        matchType:
          type: string
          enum: [SINGLES, DOUBLES, MIXED_DOUBLES]
        matchFormat:
          type: string
          enum: [BEST_OF_THREE, BEST_OF_FIVE]
        matchDate:
          type: string
          format: date
        team1:
          type: array
          items:
            type: string
            format: uuid
        team2:
          type: array
          items:
            type: string
            format: uuid
        venue:
          type: string
          nullable: true
        tournamentName:
          type: string
          nullable: true

    SetScoreRequest:
      type: object
      required:
        - team1Games
        - team2Games
      properties:
        team1Games:
          type: integer
        team2Games:
          type: integer
        tiebreakTeam1Points:
          type: integer
          nullable: true
        tiebreakTeam2Points:
          type: integer
          nullable: true

    MatchResultRequest:
      type: object
      required:
        - sets
      properties:
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SetScoreRequest'

    MatchStateRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean

    MatchSideResponse:
      type: object
      required:
        - teamId
        - userIds
      properties:
        teamId:
          type: string
          format: uuid
        userIds:
          type: array
          items:
            type: string
            format: uuid

    MatchSetResponse:
      type: object
      required:
        - setNumber
        - team1Games
        - team2Games
        - winnerTeamId
      properties:
        setNumber:
          type: integer
        team1Games:
          type: integer
        team2Games:
          type: integer
        winnerTeamId:
          type: string
          format: uuid
        tiebreakTeam1Points:
          type: integer
          nullable: true
        tiebreakTeam2Points:
          type: integer
          nullable: true

    MatchResponse:
      type: object
      required:
        - id
        - ratingSystem
        - matchType
        - matchFormat
        - matchDate
        - status
        - team1
        - team2
        - sets
        - isActive
      properties:
        id:
          type: string
          format: uuid
        ratingSystem:
          type: string
          enum: [NTRP, UTR]
        matchType:
          type: string
          enum: [SINGLES, DOUBLES, MIXED_DOUBLES]
        matchFormat:
          type: string
          enum: [BEST_OF_THREE, BEST_OF_FIVE]
        matchDate:
          type: string
          format: date
        status:
          type: string
          enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]
        team1:
          $ref: '#/components/schemas/MatchSideResponse'
        team2:
          $ref: '#/components/schemas/MatchSideResponse'
        winnerTeamId:
          type: string
          format: uuid
          nullable: true
        sets:
          type: array
          items:
            $ref: '#/components/schemas/MatchSetResponse'
        venue:
          type: string
          nullable: true
        tournamentName:
          type: string
          nullable: true
        isActive:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        ratedAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
          format: uuid
          nullable: true
        recordedBy:
          type: string
          format: uuid
          nullable: true

    CalculationRequest:
      type: object
      properties:
        dryRun:
          type: boolean
          default: true
          description: Defaults to true (preview only); set false to commit.

    PlayerChangeResponse:
      type: object
      required:
        - userId
        - system
        - previousRating
        - newRating
        - change
        - percentChange
        - levelChanged
      properties:
        userId:
          type: string
          format: uuid
        system:
          type: string
          enum: [NTRP, UTR]
        previousRating:
          type: string
        newRating:
          type: string
        change:
          type: string
        percentChange:
          type: string
        previousLevel:
          type: string
          nullable: true
        newLevel:
          type: string
          nullable: true
        levelChanged:
          type: boolean

    MatchCalculationResponse:
      type: object
      required:
        - matchId
        - matchDate
        - changes
      properties:
        matchId:
          type: string
          format: uuid
        matchDate:
          type: string
          format: date
        changes:
          type: array
          items:
            $ref: '#/components/schemas/PlayerChangeResponse'

    CalculationResponse:
      type: object
      required:
        - dryRun
        - matchesProcessed
        - matches
      properties:
        dryRun:
          type: boolean
        matchesProcessed:
          type: integer
        matches:
          type: array
          items:
            $ref: '#/components/schemas/MatchCalculationResponse'
