openapi: 3.0.0
info:
  title: Skopeo API
  version: 1.0.0
  description: Performance-based tennis ranking calculation API supporting NTRP and UTR rating systems

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Rankings
    description: Rating calculation endpoints
  - name: Users
    description: User management — provisioning and profile CRUD (Firebase-authenticated)
  - name: Contacts
    description: Email/phone management; verification is an ADMINISTRATOR action

paths:
  /api/v1/calculate-ranking:
    post:
      summary: Calculate ranking changes
      description: |
        Calculates rating changes for players based on match results.
        Supports both NTRP (National Tennis Rating Program) and UTR (Universal Tennis Rating) systems.

        The algorithm uses a performance-based Elo calculation that considers:
        - Current player ratings and rating difference
        - Match score and game margins
        - Dominance factor (games won ratio)
        - Expected vs actual performance

        Returns updated ratings with published levels and percentage changes.
      tags:
        - Rankings
      requestBody:
        required: true
        description: Match details and player ratings
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RankingCalculationRequest'
            example:
              teams:
                T1:
                  teamId: "T1"
                  name: "Player 1"
                  players:
                    - playerId: "P1"
                      name: "Player 1"
                      rating:
                        value: "4.5"
                        system: "NTRP"
                  teamType: "SINGLES"
                T2:
                  teamId: "T2"
                  name: "Player 2"
                  players:
                    - playerId: "P2"
                      name: "Player 2"
                      rating:
                        value: "4.0"
                        system: "NTRP"
                  teamType: "SINGLES"
              matchScore:
                sets:
                  - games:
                      T1: 6
                      T2: 2
                    winnerTeamId: "T1"
      responses:
        '200':
          description: Successfully calculated rating changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingCalculationResponse'
        '400':
          description: Invalid request (validation error or malformed JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users:
    post:
      summary: Provision the authenticated user
      description: |
        The single final step of every sign-up flow (Google, Facebook, manual).
        Identity (firebase uid, email, sign-in provider, photo) is taken from the
        verified Firebase token — never the request body. Idempotent: re-posting with
        an already-known uid returns the existing user with 200 instead of 201.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '200':
          description: User already existed (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid Firebase token

  /api/v1/users/me:
    get:
      summary: Get the authenticated user's own profile
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The caller's profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid Firebase token
        '404':
          description: Caller has not been provisioned yet (POST /api/v1/users first)

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a user by id
      description: Permitted only for the user themselves or an ADMINISTRATOR.
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The requested user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Malformed id
        '401':
          description: Missing or invalid Firebase token
        '403':
          description: Caller is neither the target user nor an ADMINISTRATOR
        '404':
          description: No such user
    patch:
      summary: Partially update a user's profile
      description: Omitted (null) fields are left unchanged. Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such user
    put:
      summary: Replace a user's mutable profile fields
      description: Replaces photoUrl/dateOfBirth/gender/city wholesale — omitted fields are cleared. Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such user
    delete:
      summary: Deactivate (soft-delete) a user
      description: Sets is_active to false. Self-or-ADMINISTRATOR only.
      tags:
        - Users
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: User deactivated
        '403':
          description: Forbidden
        '404':
          description: No such user

  /api/v1/users/{userId}/contacts:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List a user's contacts
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The user's contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactResponse'
        '403':
          description: Forbidden
        '404':
          description: No such user
    post:
      summary: Add an email or phone
      description: Created as MANUAL/PENDING. Self-or-ADMINISTRATOR.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreateRequest'
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body
        '403':
          description: Forbidden
        '404':
          description: No such user
        '409':
          description: A contact of that type already exists for the user

  /api/v1/users/{userId}/contacts/{id}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a contact
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      responses:
        '200':
          description: The contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '403':
          description: Forbidden
        '404':
          description: No such contact
    patch:
      summary: Change a contact's address
      description: Updates value/isPrimary. Resets verification to PENDING. Self-or-ADMINISTRATOR.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactUpdateRequest'
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body or malformed id
        '403':
          description: Forbidden
        '404':
          description: No such contact
    delete:
      summary: Delete a contact
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      responses:
        '204':
          description: Contact deleted
        '403':
          description: Forbidden
        '404':
          description: No such contact

  /api/v1/users/{userId}/contacts/{id}/verification:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Set a contact's verification state (ADMINISTRATOR only)
      description: |
        Manual stand-in for automated OTP. Only an ADMINISTRATOR may call this. A VERIFIED
        status stamps verifiedAt/verifiedBy and the method (default ADMIN_OVERRIDE); any
        other status clears those audit fields.
      tags:
        - Contacts
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Invalid body
        '403':
          description: Caller is not an ADMINISTRATOR
        '404':
          description: No such contact
        '409':
          description: This value is already verified for another account

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase-issued ID token (RS256), verified against Google's public keys.
  schemas:
    RankingCalculationRequest:
      type: object
      required:
        - teams
        - matchScore
      properties:
        teams:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Team'
          description: Map of team IDs to Team objects (exactly 2 teams required)
        matchScore:
          $ref: '#/components/schemas/MatchScore'
        options:
          $ref: '#/components/schemas/RatingCalculationOptions'

    RankingCalculationResponse:
      type: object
      required:
        - ratingChanges
        - players
        - teams
      properties:
        ratingChanges:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RatingChange'
          description: Map of player IDs to rating changes
        players:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PlayerProfile'
          description: Map of player IDs to updated player profiles
        teams:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Team'
          description: Map of team IDs to updated teams with updated players

    PlayerProfile:
      type: object
      required:
        - playerId
        - name
        - rating
      properties:
        playerId:
          type: string
        name:
          type: string
        rating:
          $ref: '#/components/schemas/Rating'

    Team:
      type: object
      required:
        - teamId
        - name
        - players
      properties:
        teamId:
          type: string
          minLength: 1
          maxLength: 50
          description: Unique identifier for this team in the match context
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Team name (for singles - player name, for doubles - "Player1/Player2")
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerProfile'
          minItems: 1
          maxItems: 2
          description: List of players in this team (1 for singles, 2 for doubles)
        teamType:
          $ref: '#/components/schemas/TeamType'
          default: SINGLES
          description: Type of team (SINGLES, DOUBLES, or MIXED_DOUBLES)

    TeamType:
      type: string
      enum:
        - SINGLES
        - DOUBLES
        - MIXED_DOUBLES
      description: |
        Team type:
        - SINGLES: 1 player per team
        - DOUBLES: 2 players per team
        - MIXED_DOUBLES: 2 players per team (male + female)

    Rating:
      type: object
      required:
        - value
        - system
      properties:
        value:
          type: string
          description: The numeric rating value (e.g., "4.5", "10.123456")
        system:
          $ref: '#/components/schemas/RatingSystem'
        publishedLevel:
          $ref: '#/components/schemas/Level'
          description: The published level (optional in request, always present in response)

    Level:
      type: object
      required:
        - value
        - minRating
        - maxRating
        - system
      properties:
        value:
          type: string
          description: The published level value (e.g., "4.5" for NTRP, "10.0" for UTR)
        minRating:
          type: string
          description: Minimum rating for this level (inclusive)
        maxRating:
          type: string
          description: Maximum rating for this level (exclusive)
        system:
          $ref: '#/components/schemas/RatingSystem'

    RatingSystem:
      type: string
      enum:
        - NTRP
        - UTR
      description: |
        Rating system:
        - NTRP: National Tennis Rating Program (1.0 - 7.0 range)
        - UTR: Universal Tennis Rating (1.0 - 16.0 range)

    MatchScore:
      type: object
      required:
        - sets
      properties:
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SetScore'
        winnerTeamId:
          type: string
          description: Team ID of the match winner. Defaults to the team that won the most sets when omitted.
        loserTeamId:
          type: string
          description: Team ID of the match loser. Defaults to the team that lost the most sets when omitted; must differ from the winner and be one of the teams.
        matchFormat:
          type: string
          enum: [BEST_OF_THREE, BEST_OF_FIVE, SINGLE_SET, ADVANTAGE_SET]
          default: BEST_OF_THREE

    SetScore:
      type: object
      required:
        - games
      properties:
        games:
          type: object
          additionalProperties:
            type: integer
        winnerTeamId:
          type: string
          description: Team ID of the set winner. Defaults to the team with the most games when omitted.
        loserTeamId:
          type: string
          description: Team ID of the set loser. Defaults to the team with the fewest games when omitted; must differ from the winner.
        tiebreak:
          $ref: '#/components/schemas/TiebreakScore'

    TiebreakScore:
      type: object
      required:
        - points
      description: |
        Informational only: documents how many points the tiebreak was (e.g. 7-5).
        The tiebreak is part of the set score, so its winner must be the set winner.
        Tiebreak points are not included in the dominance calculation of the match —
        only games count.
      properties:
        points:
          type: object
          additionalProperties:
            type: integer
        winnerTeamId:
          type: string
          description: Team ID of the tiebreak winner. Defaults to the team with the most points when omitted.
        loserTeamId:
          type: string
          description: Team ID of the tiebreak loser. Defaults to the team with the fewest points when omitted; must differ from the winner.

    RatingCalculationOptions:
      type: object
      properties:
        smoothingEnabled:
          type: boolean
          default: false
        smoothingFactor:
          type: number
          format: double
          default: 0.5

    RatingChange:
      type: object
      required:
        - change
        - previousRating
        - newRating
        - percentChange
        - levelChanged
      properties:
        change:
          type: string
          description: The absolute rating change (e.g., "+0.123456" or "-0.045678")
        previousRating:
          $ref: '#/components/schemas/Rating'
          description: The player's rating before the match
        newRating:
          $ref: '#/components/schemas/Rating'
          description: The player's rating after the match (includes updated publishedLevel)
        percentChange:
          type: string
          description: The percentage change in rating (e.g., "+2.75%")
        levelChanged:
          type: boolean
          description: Whether the player's published level changed (e.g., 4.0 → 4.5)

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    NameDto:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum: [FIRST, MIDDLE, LAST, SUFFIX, NICKNAME, PREFERRED, FULL, GOVERNMENT]
        value:
          type: string
        isPrimary:
          type: boolean
          default: false

    ContactDto:
      type: object
      required:
        - id
        - type
        - value
        - source
        - status
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        source:
          type: string
          enum: [GOOGLE, FACEBOOK, MANUAL]
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]
        isPrimary:
          type: boolean

    IdentityDto:
      type: object
      required:
        - provider
        - providerUid
      properties:
        provider:
          type: string
          enum: [GOOGLE, FACEBOOK, PASSWORD]
        providerUid:
          type: string
        isPrimary:
          type: boolean

    CreateUserRequest:
      type: object
      description: |
        Profile details the client supplies. Identity and email come from the verified
        token and are ignored if present here.
      properties:
        names:
          type: array
          items:
            $ref: '#/components/schemas/NameDto'
        phone:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
          description: ISO-8601 (yyyy-MM-dd)
        gender:
          type: string
          nullable: true
          enum: [M, F, Other]
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-2 (defaults to PH)

    ProfileRequest:
      type: object
      description: |
        Mutable profile fields. PATCH leaves omitted (null) fields unchanged;
        PUT replaces all of them (omitted fields are cleared).
      properties:
        photoUrl:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          nullable: true
          enum: [M, F, Other]
        city:
          type: string
          nullable: true

    UserResponse:
      type: object
      required:
        - id
        - country
        - kycVerified
        - isActive
        - names
        - contacts
        - identities
        - capabilities
      properties:
        id:
          type: string
          format: uuid
        firebaseUid:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
        kycVerified:
          type: boolean
        isActive:
          type: boolean
        names:
          type: array
          items:
            $ref: '#/components/schemas/NameDto'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactDto'
        identities:
          type: array
          items:
            $ref: '#/components/schemas/IdentityDto'
        capabilities:
          type: array
          items:
            type: string
            enum: [PLAYER, HOST, CLUB_OWNER, ADMINISTRATOR]

    ContactCreateRequest:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        isPrimary:
          type: boolean
          default: true

    ContactUpdateRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
        isPrimary:
          type: boolean
          default: true

    VerificationRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          description: Defaults to ADMIN_OVERRIDE when status is VERIFIED.
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]

    ContactResponse:
      type: object
      required:
        - id
        - userId
        - type
        - value
        - source
        - status
        - isPrimary
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: [EMAIL, PHONE]
        value:
          type: string
        source:
          type: string
          enum: [GOOGLE, FACEBOOK, MANUAL]
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED]
        method:
          type: string
          nullable: true
          enum: [OAUTH_PROVIDER, EMAIL_LINK, SMS_OTP, WHATSAPP_OTP, VIBER_OTP, ADMIN_OVERRIDE]
        isPrimary:
          type: boolean
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        verifiedBy:
          type: string
          format: uuid
          nullable: true
