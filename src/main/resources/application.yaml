ktor:
  application:
    id: skopeo
    modules:
      - org.skopeo.ApplicationKt.module
  deployment:
    port: 8080
    host: 0.0.0.0

firebase:
  # Firebase project id — the issuer/audience anchor for verifying ID tokens.
  # Defaults to the GCP project (skopeo-prod); override per-environment with
  # FIREBASE_PROJECT_ID. (A project id is public, not a secret.)
  projectId: "$FIREBASE_PROJECT_ID:skopeo-prod"

admin:
  # Comma-separated allowlist of emails auto-granted ADMINISTRATOR on sign-up/login, but ONLY when
  # the email is provider-verified (the verified-email gate). Bootstrap / break-glass only — everyday
  # admin grants go through the API. Source from Secret Manager; empty/unset = no auto-admins.
  # See docs/engineering/architecture/ADMIN_BOOTSTRAP.md.
  emails: "$ADMIN_EMAILS:"

database:
  url: "$DATABASE_URL:jdbc:postgresql://localhost:5432/SkopeoDb"
  driver: org.postgresql.Driver
  user: "$DATABASE_USER:postgres"
  password: "$DATABASE_PASSWORD:postgres"
  pool:
    maximumPoolSize: 10
    minimumIdle: 2
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000
