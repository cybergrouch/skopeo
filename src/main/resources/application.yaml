ktor:
  application:
    id: skopeo
    modules:
      - org.skopeo.ApplicationKt.module
  deployment:
    port: 8080
    host: 0.0.0.0

database:
  url: "$DATABASE_URL:jdbc:postgresql://localhost:5432/SkopeoDb"
  driver: org.postgresql.Driver
  user: "$DATABASE_USER:postgres"
  password: "$DATABASE_PASSWORD:postgres"
  pool:
    maximumPoolSize: 10
    minimumIdle: 2
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000
