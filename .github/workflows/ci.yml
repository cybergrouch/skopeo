name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write # dorny/test-reporter publishes the "Test Report" check run
  pull-requests: write # sticky coverage comments (marocchino/sticky-pull-request-comment)

# Cancel superseded runs on the same ref (e.g. new push to a PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        # Full history (not the default shallow depth-1) so diff-cover can walk the
        # commit ancestry to origin/main and compute patch (changed-lines) coverage.
        with:
          fetch-depth: 0

      # Install BOTH JDK 17 and 21. The last entry (21) becomes JAVA_HOME, so
      # Gradle's daemon — and detekt — run on 21. This is required: detekt 1.23.8
      # crashes on JDK 25+, which is why gradle/gradle-daemon-jvm.properties pins
      # the daemon to 21. The project still compiles with the Java 17 toolchain,
      # discovered via org.gradle.java.installations.fromEnv in gradle.properties.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - uses: gradle/actions/setup-gradle@v6

      - name: Build, lint, detekt, test, verify coverage
        run: ./gradlew check

      # Quick overall coverage table on the run Summary page (even if the gate failed).
      # Captured to a file so the same markdown can be reused in the PR comment below.
      - name: Coverage summary
        if: always()
        run: |
          python3 scripts/coverage-summary.py | tee coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      # Drillable per-test report as a "Test Report" check; failures are expanded with
      # their stack trace and annotated on the source line.
      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Report
          path: '**/build/test-results/test/TEST-*.xml'
          reporter: java-junit
          list-suites: all
          list-tests: all
          # Publish as a drillable "Test Report" check run (not just the run summary).
          use-actions-summary: 'false'

      # Patch (changed-lines) coverage against origin/main via diff-cover. JaCoCo package
      # names + sourcefile names resolve under src/main/kotlin, so diff-cover maps the
      # changed Kotlin lines to their coverage. Non-blocking: the gate is `./gradlew check`.
      - name: Backend patch coverage (diff-cover)
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        run: |
          pip install --quiet diff-cover
          diff-cover build/reports/jacoco/test/jacocoTestReport.xml \
            --compare-branch=origin/main \
            --src-roots src/main/kotlin \
            --format markdown:backend-patch.md || echo "_diff-cover produced no patch report._" > backend-patch.md

      # Sticky PR comment (updated in place across pushes) with overall + patch coverage.
      # Never fails the build.
      - name: Assemble backend coverage comment
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        run: |
          {
            echo "## 🧪 Backend coverage"
            echo
            if [ -f coverage-summary.md ]; then
              cat coverage-summary.md
            else
              echo "_No coverage report found._"
            fi
            echo
            echo "### Patch coverage (changed lines vs \`main\`)"
            echo
            if [ -f backend-patch.md ]; then
              cat backend-patch.md
            else
              echo "_No patch coverage computed._"
            fi
          } > backend-comment.md

      - name: Post backend coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        with:
          header: coverage-backend
          path: backend-comment.md

  # Secret scan: block commits that introduce API keys, tokens, or credentials.
  # gitleaks-action scans the commits in the push / PR (not full history), reads
  # .gitleaks.toml (which allowlists the already-rotated historical leak), and
  # fails the job on a finding. Mirrors the local pre-commit hook (installGitHooks).
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the action can diff the commit range
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Web client (web/): the orval client is generated from the backend OpenAPI
  # spec via npm pre-hooks (pretypecheck/prebuild), so typecheck and build prove
  # the frontend stays in sync with the API contract.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
        # Full history so diff-cover can diff frontend coverage against origin/main.
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (generates the API client)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (JUnit report + coverage)
        run: npm run test:ci

      - name: Build
        run: npm run build

      # Drillable per-test report as a "Web Test Report" check (mirrors the API's
      # Test Report); failures expand with their assertion and source location.
      - name: Web test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Web Test Report
          path: web/test-results/junit.xml
          reporter: jest-junit
          list-suites: all
          list-tests: all
          use-actions-summary: 'false'

      # Overall coverage from the vitest v8 lcov, plus patch (changed-lines) coverage
      # via diff-cover. The lcov's SF paths are relative to web/, so they are prefixed
      # with web/ to become repo-relative before diff-cover diffs against origin/main.
      # Non-blocking: the coverage gate stays in `./gradlew check` (backend) / vitest.
      - name: Web patch coverage (diff-cover)
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        working-directory: .
        run: |
          pip install --quiet diff-cover
          # lcov overall (line coverage summed from DA records).
          python3 - <<'PY' > web-overall.md
          total = covered = 0
          try:
              with open("web/coverage/lcov.info") as f:
                  for line in f:
                      if line.startswith("DA:"):
                          _, hits = line[3:].split(",")
                          total += 1
                          if int(hits) > 0:
                              covered += 1
          except FileNotFoundError:
              print("_No coverage report found._")
          else:
              pct = f"{100 * covered // total}% ({covered}/{total})" if total else "—"
              print("| Metric | Coverage |")
              print("|--------|----------|")
              print(f"| Lines | {pct} |")
          PY
          # Repo-relative lcov paths (web/src/...) so diff-cover matches git diff paths.
          sed 's|^SF:src/|SF:web/src/|' web/coverage/lcov.info > web/coverage/lcov-rooted.info
          diff-cover web/coverage/lcov-rooted.info \
            --compare-branch=origin/main \
            --format markdown:web-patch.md || echo "_diff-cover produced no patch report._" > web-patch.md

      - name: Assemble web coverage comment
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        working-directory: .
        run: |
          {
            echo "## 🧪 Web coverage"
            echo
            if [ -f web-overall.md ]; then
              cat web-overall.md
            else
              echo "_No coverage report found._"
            fi
            echo
            echo "### Patch coverage (changed lines vs \`main\`)"
            echo
            if [ -f web-patch.md ]; then
              cat web-patch.md
            else
              echo "_No patch coverage computed._"
            fi
          } > web-comment.md

      - name: Post web coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        with:
          header: coverage-web
          path: web-comment.md
