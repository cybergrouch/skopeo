name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write # dorny/test-reporter publishes the "Test Report" check run

# Cancel superseded runs on the same ref (e.g. new push to a PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        # Full history (not the default shallow depth-1) so Codecov can walk the
        # commit ancestry to the base commit and compute diff coverage. A shallow
        # clone is what triggers Codecov's "Missing Base Commit" warning on PRs.
        with:
          fetch-depth: 0

      # Install BOTH JDK 17 and 21. The last entry (21) becomes JAVA_HOME, so
      # Gradle's daemon — and detekt — run on 21. This is required: detekt 1.23.8
      # crashes on JDK 25+, which is why gradle/gradle-daemon-jvm.properties pins
      # the daemon to 21. The project still compiles with the Java 17 toolchain,
      # discovered via org.gradle.java.installations.fromEnv in gradle.properties.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - uses: gradle/actions/setup-gradle@v6

      - name: Build, lint, detekt, test, verify coverage
        run: ./gradlew check

      # Quick overall coverage table on the run Summary page (even if the gate failed).
      - name: Coverage summary
        if: always()
        run: python3 scripts/coverage-summary.py >> "$GITHUB_STEP_SUMMARY"

      # Drillable per-test report as a "Test Report" check; failures are expanded with
      # their stack trace and annotated on the source line.
      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Report
          path: '**/build/test-results/test/TEST-*.xml'
          reporter: java-junit
          list-suites: all
          list-tests: all
          # Publish as a drillable "Test Report" check run (not just the run summary).
          use-actions-summary: 'false'

      # Upload coverage to Codecov, which annotates uncovered changed lines inline on the
      # PR diff and reports patch (changed-lines) coverage. Non-blocking — the real gate is
      # the JaCoCo verification in `./gradlew check`.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: always()
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Web client (web/): the orval client is generated from the backend OpenAPI
  # spec via npm pre-hooks (pretypecheck/prebuild), so typecheck and build prove
  # the frontend stays in sync with the API contract.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
        # Full history so Codecov can diff frontend coverage against the base.
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (generates the API client)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (JUnit report + coverage)
        run: npm run test:ci

      - name: Build
        run: npm run build

      # Drillable per-test report as a "Web Test Report" check (mirrors the API's
      # Test Report); failures expand with their assertion and source location.
      - name: Web test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Web Test Report
          path: web/test-results/junit.xml
          reporter: jest-junit
          list-suites: all
          list-tests: all
          use-actions-summary: 'false'

      # Frontend coverage to Codecov under the `frontend` flag; merged with the
      # backend upload into one commit report (comment waits for both — see codecov.yml).
      - name: Upload web coverage to Codecov
        uses: codecov/codecov-action@v7
        if: always()
        with:
          files: web/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
