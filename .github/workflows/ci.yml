name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write # publish the JUnit test-report check run
  pages: write # deploy the JaCoCo HTML report to GitHub Pages
  id-token: write # authenticate the Pages deployment

# Cancel superseded runs on the same ref (e.g. new push to a PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Install BOTH JDK 17 and 21. The last entry (21) becomes JAVA_HOME, so
      # Gradle's daemon — and detekt — run on 21. This is required: detekt 1.23.8
      # crashes on JDK 25+, which is why gradle/gradle-daemon-jvm.properties pins
      # the daemon to 21. The project still compiles with the Java 17 toolchain,
      # discovered via org.gradle.java.installations.fromEnv in gradle.properties.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - uses: gradle/actions/setup-gradle@v6

      - name: Build, lint, detekt, test, verify coverage
        run: ./gradlew check

      # Surface coverage on the run summary page, even if `check` failed (the JaCoCo
      # report is still generated when only the coverage gate fails).
      - name: Coverage summary
        if: always()
        run: python3 scripts/coverage-summary.py >> "$GITHUB_STEP_SUMMARY"

      # Per-test results as a "Test Report" check run, with failures annotated on the diff.
      - name: Publish test report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: Test Report
          detailed_summary: true

      # Stage the JaCoCo HTML (source melded with coverage) for Pages — main only,
      # and only on a successful build (implicit success() since no status function here).
      - name: Upload coverage report for Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/reports/jacoco/test/html

  # Publish the JaCoCo HTML report to GitHub Pages (latest main build).
  # Requires Pages to be enabled with "GitHub Actions" as the source in repo settings.
  deploy-coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
