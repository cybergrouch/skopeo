name: Release

# One-click release (manual trigger). It:
#   1. Derives the release version by stripping -SNAPSHOT from build.gradle.kts (e.g. 0.0.1-SNAPSHOT
#      → 0.0.1) — or uses the `version` input if you pass one.
#   2. Creates a release commit that sets that version (so the tagged build's /health reports it),
#      tags it `vX.Y.Z`, and pushes ONLY the tag (main is left untouched).
#   3. Publishes a GitHub Release for the tag, then explicitly dispatches deploy-api.yml /
#      deploy-web.yml for it (the release:published event from GITHUB_TOKEN does NOT trigger other
#      workflows — GitHub's recursion guard — so they must be dispatched directly).
#   4. Opens a PR bumping main's dev version to the next -SNAPSHOT (you review + merge it).
#
# main always carries the dev `-SNAPSHOT` version; official versions live on tags. To release the
# current SNAPSHOT as-is (e.g. the initial v0.0.1-SNAPSHOT marker), pass it explicitly via `version`.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (blank = strip -SNAPSHOT from build.gradle.kts, e.g. 0.0.1)"
        required: false
        type: string

permissions:
  contents: write       # push the tag + the bump branch
  pull-requests: write  # open the bump PR
  actions: write        # dispatch deploy-api.yml / deploy-web.yml (workflow_dispatch)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute versions
        id: v
        run: |
          set -euo pipefail
          CURRENT=$(grep -E '^version = "' build.gradle.kts | head -1 | sed -E 's/^version = "(.*)"/\1/')
          RELEASE="${{ inputs.version }}"
          if [ -z "$RELEASE" ]; then RELEASE="${CURRENT%-SNAPSHOT}"; fi
          # Next dev version = bump the patch of the release's base, re-add -SNAPSHOT.
          BASE="${RELEASE%-SNAPSHOT}"
          IFS=. read -r MAJ MIN PAT <<< "$BASE"
          NEXT="${MAJ}.${MIN}.$((PAT + 1))-SNAPSHOT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE"  >> "$GITHUB_OUTPUT"
          echo "next=$NEXT"        >> "$GITHUB_OUTPUT"
          echo "Releasing v$RELEASE (from $CURRENT); next dev = $NEXT"

      - name: Tag the release commit (tag only — main untouched)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REL="${{ steps.v.outputs.release }}"
          # If the tag value differs from the file, write the release version onto a detached commit
          # so the tagged build reports the official version; otherwise tag HEAD as-is.
          if [ "$REL" != "${{ steps.v.outputs.current }}" ]; then
            sed -i -E "s/^version = \".*\"/version = \"$REL\"/" build.gradle.kts
            git commit -am "release: v$REL"
          fi
          git tag -a "v$REL" -m "Skopeo v$REL"
          git push origin "v$REL"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.v.outputs.release }}" --title "v${{ steps.v.outputs.release }}" --generate-notes

      - name: Deploy the released tag (API + Web)
        # The release:published event above is created by GITHUB_TOKEN, which (by GitHub's recursion
        # guard) does NOT trigger deploy-api/deploy-web. So dispatch them explicitly for the new tag.
        # workflow_dispatch IS the documented exception — GITHUB_TOKEN can trigger it, provided the job
        # has `actions: write` (see permissions above). Each deploy still pauses at the `production`
        # environment's gate before shipping. A RELEASE_PAT secret, if set, takes precedence.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
        run: |
          set -euo pipefail
          REL="v${{ steps.v.outputs.release }}"
          gh workflow run deploy-api.yml --ref "$REL"
          gh workflow run deploy-web.yml --ref "$REL"

      - name: Open dev version-bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NEXT="${{ steps.v.outputs.next }}"
          BRANCH="chore/bump-$NEXT"
          # Branch from the pristine origin/main (not the local release commit).
          git checkout -B "$BRANCH" origin/main
          sed -i -E "s/^version = \".*\"/version = \"$NEXT\"/" build.gradle.kts
          git commit -am "chore: bump dev version to $NEXT"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: bump dev version to $NEXT" \
            --body "Post-release dev version bump after **v${{ steps.v.outputs.release }}**. Merge to continue development on \`$NEXT\`."
