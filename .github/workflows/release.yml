name: Release

# Step 1 of a two-phase release (manual trigger). It opens a PR that sets the release version
# (`X.Y.Z`) on main. main is branch-protected (PR + CI required, admins not exempt), so the
# release-version commit must land via a PR — it can't be pushed straight to main, and we no longer
# tag an orphan commit off to the side. When you merge that release PR, `tag-and-ship.yml` takes over:
# it tags the (now on-main) commit, publishes the GitHub Release, dispatches the deploys, and opens
# the follow-up dev-version bump PR.
#
# So main carries an official `X.Y.Z` only briefly — between the release PR merge and the bump PR
# merge — and otherwise carries `X.Y.Z-SNAPSHOT`. Each release is two merges: the release PR, then
# the bump PR.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (blank = strip -SNAPSHOT from build.gradle.kts, e.g. 0.0.3)"
        required: false
        type: string

permissions:
  contents: write       # push the release branch
  pull-requests: write  # open the release PR

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute release version
        id: v
        run: |
          set -euo pipefail
          CURRENT=$(grep -E '^version = "' build.gradle.kts | head -1 | sed -E 's/^version = "(.*)"/\1/')
          RELEASE="${{ inputs.version }}"
          if [ -z "$RELEASE" ]; then RELEASE="${CURRENT%-SNAPSHOT}"; fi
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Preparing release v$RELEASE (from $CURRENT)"

      - name: Open the release PR (version → release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REL="${{ steps.v.outputs.release }}"
          BRANCH="release/v$REL"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH" origin/main
          sed -i -E "s/^version = \".*\"/version = \"$REL\"/" build.gradle.kts
          git commit -am "release: v$REL"
          git push -u origin "$BRANCH" --force-with-lease
          # Reuse an existing release PR for this version if one is already open.
          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create --base main --head "$BRANCH" \
              --title "release: v$REL" \
              --body "Cuts **v$REL**. Merging this PR lands the release-version commit on main, then \`tag-and-ship.yml\` tags it, publishes the GitHub Release, dispatches the deploys, and opens the dev-version bump PR. main carries v$REL only until that bump PR merges."
          fi
