name: Deploy Web

# Deploys the web client to Firebase Hosting. Release-driven — NOT on every merge. Triggered only by
# workflow_dispatch: tag-and-ship.yml dispatches it for the release tag once a `release: vX.Y.Z` PR
# lands on main (in lockstep with the API), or run it manually from the Actions tab against any ref.
# Inert until configured: the job is skipped unless the VITE_FIREBASE_PROJECT_ID repo variable is set.
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.VITE_FIREBASE_PROJECT_ID != '' }}
    # Same manual-approval gate as the API: nothing ships on a release until you approve in the
    # `production` GitHub Environment, so the web and API release together (configure required
    # reviewers on the `production` environment — CICD.md §2c).
    environment: production
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vite inlines VITE_* at build time. These are public Firebase client values
      # (safe in the bundle), supplied as repo *variables*; the Firebase secret
      # never leaves Firebase. The deploy service account is the only secret.
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .
