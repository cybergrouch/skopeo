name: Deploy API

# Deploys the Ktor API to GCP Cloud Run on every push to main that touches the backend.
# Keyless auth via Workload Identity Federation (CICD.md C4) — no service-account JSON is stored.
# Inert until configured: the job is skipped unless the WIF_PROVIDER repo variable is set, so
# merging this workflow never produces a red run before the GCP resources exist.
# Production deploys wait on the `production` GitHub Environment's manual-approval gate.
# Flyway migrations run on app startup (DatabaseConfig.init), so the new revision migrates as it boots.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'Dockerfile'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation OIDC

concurrency:
  group: deploy-api
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip entirely until WIF is configured (keeps merges green before GCP exists).
    if: ${{ vars.WIF_PROVIDER != '' }}
    # Manual-approval gate: configure required reviewers on the `production` environment in repo settings.
    environment: production
    steps:
      - uses: actions/checkout@v7

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Build from source (Cloud Build uses the repo Dockerfile) and deploy.
      # Non-secret runtime config comes from repo *variables*; DB password and the admin
      # allowlist come from Secret Manager via --set-secrets.
      #
      # WEB_ORIGINS is a comma-separated CORS allow-list (e.g. the custom apex + the Firebase
      # default), so we set env vars with gcloud's alternate-delimiter syntax: the leading "^##^"
      # makes "##" the separator between assignments, leaving commas *inside* WEB_ORIGINS intact.
      # With the default comma delimiter, a multi-origin WEB_ORIGINS would be mis-parsed.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE || 'skopeo' }}" \
            --source . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION || 'asia-southeast1' }}" \
            --allow-unauthenticated \
            --add-cloudsql-instances "${{ vars.CLOUDSQL_INSTANCE }}" \
            --set-env-vars "^##^FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}##DATABASE_URL=${{ vars.DATABASE_URL }}##DATABASE_USER=${{ vars.DATABASE_USER }}##WEB_ORIGINS=${{ vars.WEB_ORIGINS }}" \
            --set-secrets "DATABASE_PASSWORD=skopeo-db-password:latest,ADMIN_EMAILS=skopeo-admin-emails:latest" \
            --quiet
