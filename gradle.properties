# Let Gradle discover the JDKs that CI (actions/setup-java) installs, so the
# Java 17 compile toolchain is found while the daemon and detekt run on JDK 21.
# Harmless locally: Gradle ignores any of these env vars that aren't set.
org.gradle.java.installations.fromEnv=JAVA_HOME_17_X64,JAVA_HOME_21_X64
