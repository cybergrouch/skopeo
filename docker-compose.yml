services:
  tennis-levelr:
    build:
      context: .
      dockerfile: Dockerfile
    image: tennis-levelr:latest
    container_name: tennis-levelr
    ports:
      - "8080:8080"
    environment:
      # JVM memory settings (adjust based on your needs)
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Uncomment below to add volumes for local development
# volumes:
#   - ./logs:/app/logs
