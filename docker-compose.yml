services:
  postgres:
    image: postgres:15-alpine
    container_name: skopeo_db
    environment:
      POSTGRES_DB: SkopeoDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  skopeo:
    build:
      context: .
      dockerfile: Dockerfile
    image: skopeo:latest
    container_name: skopeo
    ports:
      - "8080:8080"
    environment:
      # JVM memory settings (adjust based on your needs)
      - JAVA_OPTS=-Xmx512m -Xms256m
      # Database connection
      - DATABASE_URL=jdbc:postgresql://postgres:5432/SkopeoDb
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skopeo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@skopeo.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local

# Uncomment below to add volumes for local development
# volumes:
#   - ./logs:/app/logs
